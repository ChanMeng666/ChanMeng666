name: Build README

# Rebuild README.md, llms.txt, llms-full.txt, and dist/profile.json from
# data/profile/*.yaml whenever the source data, templates, schema, or build
# scripts change. Also runs daily to refresh meta.lastModified (freshness
# signal for GEO).

on:
  push:
    branches: [main]
    paths:
      - "data/**"
      - "templates/**"
      - "scripts/**"
      - "schema/**"
      - "package.json"
      - "package-lock.json"
      - ".github/workflows/build-readme.yml"
  schedule:
    - cron: "0 17 * * *"  # 17:00 UTC daily ~= 05:00 NZST / 01:00 China
  workflow_dispatch:

# Cancel superseded builds for the same ref.
concurrency:
  group: build-readme-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Validate data/profile/*.yaml against schema
        run: npm run validate

      - name: Build outputs
        run: npm run build

      - name: Audit assets (informational)
        run: npm run audit || true

      - name: Commit regenerated outputs
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add README.md llms.txt llms-full.txt dist/profile.json
          if git diff --staged --quiet; then
            echo "No output changes."
          else
            git commit -m "chore(readme): rebuild from data/ [skip ci]"
            git push
          fi
