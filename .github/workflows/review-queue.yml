name: Monthly Review Queue

# The truth-maintenance heartbeat. Schema validation proves the data is
# well-formed; this workflow surfaces what may no longer be TRUE:
#   - entries overdue for review (lastUpdated past their tier budget)
#   - dead links in the profile shards
#   - repo health (404s, renames, archived-but-active, activity gaps)
#   - CV anchor-fact drift
# Findings are upserted into ONE issue labelled `review-queue` (edited in
# place each month, never spammed). No commits are made here, so the
# build-readme.yml auto-commit loop is untouched.

on:
  schedule:
    - cron: "0 18 1 * *" # 06:00/07:00 NZ time on the 1st of each month
  workflow_dispatch:

permissions:
  contents: read
  issues: write

jobs:
  review-queue:
    runs-on: ubuntu-latest
    env:
      GH_TOKEN: ${{ github.token }}
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: "24"
          cache: "npm"
      - run: npm ci

      - name: Build report
        run: |
          R="$RUNNER_TEMP/report.md"
          {
            echo "## Profile review queue — $(date -u +%Y-%m-%d)"
            echo ""
            echo "_Generated by review-queue.yml. Each section is report-only;_"
            echo "_fix entries in data/profile/*.yaml, then \`npm run check\`._"
            echo ""
            node scripts/check-freshness.mjs --format=md || true
            echo ""
            node scripts/check-links.mjs --format=md || true
            echo ""
            echo "### Repo health + metric drift"
            echo ""
            echo '```'
            node scripts/refresh-github-metrics.mjs || true
            echo '```'
            echo ""
            echo "### CV anchor facts"
            echo ""
            echo '```'
            node scripts/check-cv-sync.mjs || true
            echo '```'
          } > "$R"
          echo "report written: $(wc -l < "$R") lines"

      - name: Upsert review-queue issue
        run: |
          gh label create review-queue --color D93F0B \
            --description "Monthly truth-maintenance review queue" 2>/dev/null || true
          NUM=$(gh issue list --label review-queue --state open --json number --jq '.[0].number // empty')
          TITLE="Review queue: $(date -u +%Y-%m)"
          if [ -n "$NUM" ]; then
            gh issue edit "$NUM" --title "$TITLE" --body-file "$RUNNER_TEMP/report.md"
            echo "✓ updated issue #$NUM"
          else
            gh issue create --title "$TITLE" --label review-queue --body-file "$RUNNER_TEMP/report.md"
            echo "✓ created new review-queue issue"
          fi
