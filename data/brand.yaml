# =============================================================================
# brand.yaml — Chan Meng's personal visual + verbal design system.
#
# Single source of truth for tokens, signatures, and voice. Peer to
# data/profile.yaml (which holds CONTENT — work, projects, narrative).
# This file holds FORM — color, type, spacing, decoration, voice rules.
#
# v2.1.0 — "Caldera" re-skin, faithful pass. A high-contrast editorial identity
# cloned from the Caldera system: a warm basalt-grey concrete canvas, ash-white
# flat cards, near-black ink, ONE loud Digital Orange accent, violet + glare
# strictly decorative, a heavy MIXED-CASE compact-grotesque display face (Anton —
# the OFL stand-in for PP Neue Corp Compact Ultrabold), DM Sans body, huge
# friendly radii, risograph halftone-dot decorative art, and flat color-block
# hierarchy. v2.1.0 closes the three gaps vs. the reference: display font
# (Bebas → Anton), halftone imagery (was pixel-art), and the 189px hero scale.
#
# Pipeline (see scripts/build-brand.mjs):
#   data/brand.yaml
#     ↓ ajv schema/brand.schema.json
#     ↓ WCAG AA contrast gate (scripts/lib/load-brand.mjs · contrastRatio)
#     ↓ scripts/build-brand.mjs
#     ├─→ dist/brand/tokens.css           CSS variables (raw + semantic)
#     ├─→ dist/brand/tokens.json          Canonical machine-readable tokens
#     ├─→ dist/brand/design-tokens.json   DTCG / W3C design-tokens (Caldera shape)
#     ├─→ dist/brand/theme.css            Tailwind v4 @theme block
#     ├─→ dist/brand/variables.css        Plain :root custom properties
#     ├─→ dist/brand/DESIGN.md            Caldera-format spec (prose + tables)
#     ├─→ cv/tokens.typ                   Typst tokens (CV imports this)
#     ├─→ docs/brand/DESIGN.md            Human doc; auto-injected token tables
#     └─→ public/brand-system.html        Live preview page
#
# Rules of thumb when editing:
#   - Templates consume `color.semantic.*` — never `color.raw.*` directly.
#   - Don't add a new token unless two existing call-sites need it.
#   - Orange is a BLOCK background / accent rule, never small body or link text.
#   - Violet is decorative-only — big background shapes, never text or UI.
#   - Flat: depth comes from solid color blocks, never shadows or gradients.
# =============================================================================

version: "2.1.1"
lastUpdated: "2026-06-07"

# -----------------------------------------------------------------------------
# IDENTITY — who the brand is, in one place. Single-paragraph summaries each.
# -----------------------------------------------------------------------------
identity:
  name: "Chan Meng"
  tagline: "Building at the intersection of AI, cultural technology, and women's health."
  philosophy: "Subtraction for life, addition for thought."
  voiceSummary: >-
    Architecture-grade vocabulary, evidence-first claims, restraint in life and
    boldness in expression. Cross-cultural fluency without translation.
  signaturePhrase: "Subtraction for life, addition for thought."
  audiences:
    - "Founders evaluating an AI agent architect / fractional CTO"
    - "Recruiters and hiring managers in AI / full-stack / FemTech"
    - "Engineers and learners following the open-source craft"
    - "Chinese-speaking developer communities (中文社区)"
    - "Te Ao Māori partners and cultural-technology collaborators"

# -----------------------------------------------------------------------------
# COLOR — Caldera palette. Seven swatches, three working surfaces.
# raw.* is the paint shelf; semantic.* is the API templates consume.
# -----------------------------------------------------------------------------
color:
  raw:
    # Canvas / surface family — muted greys, never pure white as a page bg.
    basaltCanvas:  "#E2E2DF"   # page background — the muted base
    ashWhite:      "#F7F6F2"   # primary card / button surface
    pureWhite:     "#FFFFFF"   # text/icon fills on dark or orange fills only

    # Ink — near-black. Text, headings, strong borders, ghost outlines, links.
    abyssalInk:    "#070607"
    pureBlack:     "#000000"   # icon strokes / densest border work (Caldera pure-black)

    # Accent — the whole personality. ONE loud orange.
    digitalOrange: "#FC5000"   # primary buttons, feature cards, accent rules

    # Decorative-only — never text, never UI.
    cyberViolet:   "#524AE9"   # large background shapes, decorative cards
    pixelGlare:    "#F5F28E"   # highlight overlays, graphic accents

  semantic:
    # canvas / surface — what the page and cards sit on.
    canvasPage:        "basaltCanvas"   # default canvas — never pure white
    canvasSurface:     "ashWhite"       # cards, buttons, lifted blocks
    surfaceAccent:     "digitalOrange"  # feature / stat cards, primary button fill
    surfaceDecor:      "cyberViolet"    # decorative graphic blocks ONLY
    surfaceGlare:      "pixelGlare"     # highlight overlay / graphic accent
    surfaceTag:        "pixelGlare"     # Hazard-Yellow category-tag background (Caldera blog tags)

    # ink — text colors by role. Caldera carries hierarchy by weight/size, so
    # every text role resolves to the same near-black ink.
    inkPrimary:        "abyssalInk"     # body
    inkStrong:         "abyssalInk"     # name, section headers
    inkMuted:          "abyssalInk"     # secondary, dates, meta
    inkSubtle:         "abyssalInk"     # captions, low emphasis
    onAccent:          "pureWhite"      # text on orange / dark fills (large+bold)

    # accent — one voltage. Orange. Used as background / rule, not as text.
    accentPrimary:     "digitalOrange"  # primary action, accent rules
    accentEditorial:   "digitalOrange"  # eyebrow rules, section marks

    # surface — backgrounds for specific UI elements.
    surfacePill:       "ashWhite"       # skill pill background
    surfaceQuote:      "ashWhite"       # pull-quote background

    # edge — borders and dividers are ink (Caldera "strong borders").
    edgePill:          "abyssalInk"     # pill / ghost-button border
    ruleHairline:      "abyssalInk"     # divider rules, strong borders

# -----------------------------------------------------------------------------
# TYPOGRAPHY — two voices + a mono house-extension.
# Display = heavy compact grotesque (Anton). Body = DM Sans. Mono = datestamps.
# -----------------------------------------------------------------------------
typography:
  families:
    display:
      stack: ["Anton", "Oswald", "Bebas Neue", "Impact", "sans-serif"]
      weights: [400]
      role: "Display, headings, and stat numbers — heavy MIXED-CASE compact grotesque, tight. The magazine-cover voice."
      licenseNote: "Anton is OFL (Google Fonts) and the closest free match to the commercial PP Neue Corp Compact Ultrabold — heavy, condensed, mixed-case. Oswald 700 / Bebas Neue are deeper fallbacks. Single weight (400) renders intrinsically ultra-bold; never faux-bold."
    bodySans:
      stack: ["DM Sans", "Inter", "Segoe UI", "system-ui", "sans-serif"]
      weights: [400, 500, 700]
      role: "Body, navigation, labels — DM Sans 500, the workhorse."
      licenseNote: "DM Sans & Inter are OFL. Segoe UI is the Windows fallback."
    mono:
      stack: ["JetBrains Mono", "Consolas", "ui-monospace", "monospace"]
      weights: [400, 500]
      role: "Data signatures only — datestamps, paths, version numbers. House extension (Caldera has no mono)."
      licenseNote: "JetBrains Mono is OFL. Consolas is the Windows fallback."

  scale:
    displayXl:
      sizeWeb: "189px"
      sizePrint: "48pt"
      lineHeight: 0.94
      tracking: "0.02em"
      weight: 400
      family: "display"
      note: "Magazine-cover hero headline (web only). Anton, full-width, mixed-case."
    displayLg:
      sizeWeb: "64px"
      sizePrint: "28pt"
      lineHeight: 0.95
      tracking: "0.02em"
      weight: 400
      family: "display"
      note: "Large section / sub-hero headline. Anton, mixed-case."
    display:
      sizeWeb: "96px"
      sizePrint: "32pt"
      lineHeight: 0.94
      tracking: "0.02em"
      weight: 400
      family: "display"
      note: "Hero / page name. Anton compact ultrabold, mixed-case."
    h1:
      sizeWeb: "56px"
      sizePrint: "22pt"
      lineHeight: 0.94
      tracking: "0.02em"
      weight: 400
      family: "display"
      note: "Major headings on long-form surfaces."
    h2:
      sizeWeb: "32px"
      sizePrint: "12pt"
      lineHeight: 0.95
      tracking: "0.02em"
      weight: 400
      family: "display"
      note: "Section headers (compact display, uppercased)."
    h3:
      sizeWeb: "30px"
      sizePrint: "10pt"
      lineHeight: 1.11
      tracking: "0"
      weight: 500
      family: "bodySans"
      note: "Entry / card titles. DM Sans medium."
    body:
      sizeWeb: "16px"
      sizePrint: "9pt"
      lineHeight: 1.55
      tracking: "0"
      weight: 500
      family: "bodySans"
      note: "Default body. Never below this size. DM Sans 500."
    bodyLead:
      sizeWeb: "18px"
      sizePrint: "10pt"
      lineHeight: 1.50
      tracking: "0"
      weight: 500
      family: "bodySans"
      note: "Lead paragraphs, hero subhead."
    meta:
      sizeWeb: "14px"
      sizePrint: "8pt"
      lineHeight: 1.25
      tracking: "0"
      weight: 500
      family: "bodySans"
      note: "Dates, captions, small labels (Caldera body-sm)."
    eyebrow:
      sizeWeb: "14px"
      sizePrint: "8pt"
      lineHeight: 1.2
      tracking: "0.08em"
      weight: 700
      family: "bodySans"
      transform: "uppercase"
      note: "Small uppercased label. DM Sans bold."
    mono:
      sizeWeb: "13px"
      sizePrint: "8pt"
      lineHeight: 1.5
      tracking: "0"
      weight: 400
      family: "mono"
      note: "Datestamps, paths, version numbers."

  principles:
    - "Display is heavy compact grotesque (Anton) — the name, every heading, and stat numbers; MIXED case (not all-caps), 0.02em tracking on display only."
    - "Orange is a BLOCK background or accent rule, never small body or link text — links and labels are ink."
    - "Violet is decorative-only — large background shapes and cards, never text or UI."
    - "Flat by default: hierarchy comes from solid color blocks, not shadows or gradients."
    - "Body never sits below 16px on web or 9pt in print; DM Sans 500 is the workhorse."
    - "Mono is reserved for data signatures — datestamps, paths, version numbers."

# -----------------------------------------------------------------------------
# SPACING — 8px base, with a 10px element-gap and 40px rhythm (Caldera).
# -----------------------------------------------------------------------------
spacing:
  base: 8
  scale:
    "0":    0
    "0.5":  4
    "1":    8
    "1.25": 10
    "1.5":  12
    "2":    16
    "2.5":  20
    "3":    24
    "4":    32
    "5":    40
    "6":    48
    "7":    56
    "8":    64
    "10":   80
  rhythm:
    section: 40            # major section gap (Caldera sectionGap)
    sectionTight: 24
    sectionLarge: 80
    cardPadding: 40        # generous flat-card padding
    elementGap: 10         # gap between interactive elements
    paragraph: 16
    columnGutter: 24
    columnGutterMobile: 16

# -----------------------------------------------------------------------------
# RADIUS — Caldera's huge friendly radii. Toy-like solidity.
# -----------------------------------------------------------------------------
radius:
  none: 0
  sm:   8
  badge: 16      # squircle icon badges (orange rounded-square + white glyph)
  tag:  20       # category tags / chips (Caldera tag radius)
  cardSm: 24     # tight-grid cards + NESTED images inside a 40px card
  card: 40       # all cards / content blocks
  default: 40
  input: 100     # pill inputs
  pill: 800      # full-pill buttons

# -----------------------------------------------------------------------------
# SHADOW — none. Depth comes from solid color blocks, not stacking.
# focusRing is an accessibility affordance (keyboard focus), not elevation.
# -----------------------------------------------------------------------------
shadow:
  ambient: "none"
  focusRing: "0 0 0 3px rgba(252, 80, 0, 0.40)"

# -----------------------------------------------------------------------------
# MOTION — minimal tokens. No animation library at this level.
# -----------------------------------------------------------------------------
motion:
  duration:
    fast: 120    # ms — color, opacity, micro-state
    base: 200    # ms — layout shifts, accordion, default
    slow: 360    # ms — hero entrance, scroll reveal
  easing:
    standard: "cubic-bezier(0.2, 0, 0, 1)"
    entrance: "cubic-bezier(0.0, 0, 0.2, 1)"
    exit:     "cubic-bezier(0.4, 0, 1, 1)"

# -----------------------------------------------------------------------------
# LAYOUT — 1200px contained, 40px rhythm. Golden split kept for the CV.
# -----------------------------------------------------------------------------
layout:
  golden:
    main: "61.8%"
    side: "38.2%"
    gutter: "1.4em"
  container:
    max: 1200       # px — Caldera page max-width
    paddingMobile: 24
    paddingDesktop: 40
  breakpoints:
    sm: 640
    md: 768
    lg: 1024
    xl: 1200

# -----------------------------------------------------------------------------
# LOGO — primary wordmark + monogram, plus clearspace / minimum-size rules.
# The black monkey mark stays — a monochrome ink product mark suits Caldera.
# -----------------------------------------------------------------------------
logo:
  primary:
    path: "/public/brands/chan-monkey-logo-black.svg"
    recommendedSizes:
      heroPx: 160
      cardPx: 96
      inlinePx: 24
    clearspaceMultiple: 0.5
  monogram:
    path: "/public/brands/chan-monkey-logo-black.svg"
    note: "Used as section divider mark — see signatures.monogramDivider."
    recommendedSizes:
      dividerPx: 24
      sealPx: 48
  variants:
    black: "/public/brands/chan-monkey-logo-black.svg"
  doNot:
    - "Do not recolor the logo — black ink on basalt / ash is canonical."
    - "Do not place the logo on photographic backgrounds without an ash mat."
    - "Do not skew, rotate, or apply effects (shadows, glows, gradients)."
    - "Do not pair the logo with a generated wordmark — the SVG IS the wordmark."

# -----------------------------------------------------------------------------
# VOICE — the verbal half of the brand. Codified so an LLM agent reading
# tokens.json can align copy to Chan's voice without parsing markdown.
# -----------------------------------------------------------------------------
voice:
  principles:
    - name: "Architecture-grade vocabulary"
      rule: "Prefer engineering nouns (orchestration, dispatch, hub-and-spoke) over marketing adjectives (powerful, robust, world-class)."
      why: "Chan's existing CV uses precise nouns; recruiters who matter recognise them."
    - name: "Evidence-first"
      rule: "Every claim links to one proof point (PR, repo, live URL, paper). Adjectives without links get cut."
      why: "Established by the README redesign spec; carry forward."
    - name: "Subtraction for life, addition for thought"
      rule: "At most one orange accent per visual unit; remove decoration until what is left is the idea."
      why: "Chan's stated personal philosophy; the brand must enact it even while the surface is bold."
    - name: "Cross-cultural fluency without translation"
      rule: "Te reo Māori, 中文, English appear in their own forms — italicised once, then treated as first-class vocabulary. No parenthetical glosses unless the audience demonstrably needs them."
      why: "Existing CV does this with 'Te Whare Tapa Whā'; codify."
    - name: "Pace by white space"
      rule: "Visual rhythm beats density. The 61.8/38.2 ratio in the CV is canonical; default to it elsewhere too."
      why: "Existing theme.typ already chose this; promote it from CV-only to system-wide."
    - name: "Never apologise for restraint"
      rule: "No 'sorry it's plain', no 'minimal-but-' qualifiers. The confidence is the statement."
      why: "Restraint loses its meaning the moment it is hedged."

  vocabulary:
    prefer:
      - "orchestration"
      - "dispatch"
      - "hub-and-spoke"
      - "agentic"
      - "evidence-first"
      - "shipped"
      - "open-sourced"
      - "production"
      - "end-to-end"
    avoid:
      - "leverage"
      - "robust"
      - "world-class"
      - "best-in-class"
      - "cutting-edge"
      - "synergy"
      - "rockstar"
      - "ninja"

  examples:
    do:
      - "Recruited by Anthropic for the Claude residency programme."
      - "86.6% solo-built; AI mentor matching and membership-flow automation in production."
      - "Replaces click-through workflows with agentic ones: natural-language intent drives downstream orchestration."
    dont:
      - "Leveraged cutting-edge AI to deliver robust, world-class solutions."
      - "I'm a passionate, results-driven full-stack rockstar."
      - "Minimal-but-powerful design that just works."

# -----------------------------------------------------------------------------
# SIGNATURES — Chan's "decorative micro-signatures". All built on assets Chan
# owns (gradient-svg-generator, the monogram, OpenType features). The arcade
# banners use the pixelArt gradientType recoloured to the Caldera palette.
# -----------------------------------------------------------------------------
signatures:
  # Master kill-switch for the two GitHub-stripped typographic signatures
  # (goldEyebrow, monogramDivider). Banners render regardless of this flag.
  adoptedInReadme: false

  # 1. Hero band — once per page, top only. Holographic orange/violet/glare.
  # Uses the brand-coloured gradient-svg-generator templates (brand-*), which
  # reuse the original animation effects in the Caldera palette. The colours
  # live in the template definition, so no color params are needed here.
  heroBand:
    type: "gradient-svg"
    template: "brand-hero"
    height: 200
    duration: "8s"
    useWhen: "Top of any long-form surface."
    doNotUseWhen: "Internal sections. Multiple per page. Cards."

  # 2. Accent editorial eyebrow with em-dash (orange).
  goldEyebrow:
    type: "typographic"
    rule: "eyebrow scale + ink text + a short orange pixelArt rule above a display heading"
    useWhen: "Above any section that opens with display type. Above the hero subhead."
    doNotUseWhen: "Inline body. More than one orange mark per visual unit."

  # 3. Mono datestamp footer line.
  monoDatestamp:
    type: "typographic"
    rule: "mono scale 13px in ink; format: 'last updated · YYYY-MM-DD · build N'"
    useWhen: "Footer of every long-form surface (README, CV, brand-system, future webpages)."
    doNotUseWhen: "Short surfaces (social cards, single-screen pages)."

  # 4. Monogram dotted divider — replaces bare `---` between major shifts.
  monogramDivider:
    type: "composite"
    logoPath: "/public/brands/chan-monkey-logo-black.svg"
    logoSizePx: 24
    ruleColor: "ruleHairline"
    ruleStyle: "dotted"
    useWhen: "Between major narrative shifts (e.g. between 'Featured work' and 'Open source')."
    doNotUseWhen: "Between sibling cards or list items."

  # 4b. Halftone panels — the Caldera signature decorative art. Risograph
  #     orange→violet dot-gradient SVGs generated by scripts/build-halftone.mjs
  #     into public/brand/. Static assets (render as <img> on GitHub) so they
  #     work everywhere the animated gradient banners cannot.
  halftone:
    type: "static-svg"
    hero: "/public/brand/halftone-hero.svg"
    thumb: "/public/brand/halftone-thumb.svg"
    colors: ["digitalOrange", "cyberViolet"]
    radiusPx: 40
    useWhen: "Hero decorative panel; blog / project card thumbnails."
    doNotUseWhen: "Behind body text. As a button fill. More than one hero panel per surface."

  # 4c. Dot-grid ambient texture — the faint printed dot field Caldera lays under
  #     most sections. A CSS radial-gradient tile (no asset), ink at low opacity.
  dotGrid:
    type: "css-pattern"
    dotColor: "abyssalInk"
    dotOpacity: 0.08
    dotSizePx: 2
    spacingPx: 22
    useWhen: "Section / page backgrounds behind cards — the printed-paper ground."
    doNotUseWhen: "Directly behind body text at full strength; inside cards."

  # 4d. Dotted edge — Caldera's secondary affordance. A 2px DOTTED ink border on
  #     ghost buttons, collapsed accordion items, dividers, and carousel controls.
  #     Solid orange = primary/act; dotted ink = secondary/inactive/structural.
  dottedEdge:
    type: "border-style"
    style: "dotted"
    widthPx: 2
    color: "abyssalInk"
    useWhen: "Secondary buttons, collapsed accordion rows, vertical dividers, carousel arrows."
    doNotUseWhen: "Primary actions (those are a solid orange fill, never a dotted outline)."

  # 4e. Connected cards — the interlocking-metric motif (faithful to the live
  #     caldera.xyz stat row, inspected 2026-06-07). The cards are CREAM (never
  #     orange): a black-ink number + an orange CIRCULAR icon badge top-left.
  #     Adjacent cards are JOINED by a CREAM "dog-bone" connector — identical fill
  #     to the cards — that flares to full width where it meets each card and
  #     pinches to a thin waist in the middle, where the grey halftone canvas
  #     bites through (two radius-8 concave fillets + a ~5px centre sliver). The
  #     connector is an SVG <path> copied verbatim from caldera.xyz.
  connectedCards:
    type: "layout"
    cardFill: "canvasSurface"          # cards are cream — NOT the orange accent
    numberColor: "abyssalInk"      # the big stat number is black ink
    iconBadge: "orange circle, white glyph, top-left (64px)"
    connectorFill: "canvasSurface"     # the bone is the same cream as the cards
    connectorShape: "dog-bone SVG path (smooth radius-8 concave fillets, no centre rect — a square sliver protrudes); 16px wide in the gap, ~47% of card height; rotates 90° when cards stack"
    bridgePx: 16
    gapPx: 16
    responsive: "bones PERSIST at every breakpoint (verified live) — row + vertical bones → 2×2 CENTRE CROSS-JUNCTION (vertical bones link the top+bottom pairs, horizontal bones link the left+right pairs) → single column + a horizontal bone between every stacked pair"
    useWhen: "A tight row of closely-related metric / stat cards."
    doNotUseWhen: "Unrelated cards; single cards; content cards with long copy. Never fill these cards orange — orange lives only in the icon badge."

  # 4f. Interaction — the system's hover / active / focus / motion vocabulary.
  #     Flat-consistent: depth comes from COLOR shifts + tiny translates, never
  #     shadows. Timing/easing reference the motion.* tokens.
  interaction:
    type: "states"
    transition: "duration.base (200ms) · easing.standard for color/border; duration.fast (120ms) for transform"
    hover:
      primary: "darken the orange ~14% toward ink"
      ghost: "invert to a solid ink fill, label flips to canvas"
      dotted: "border solidifies to orange + orange label"
      navLink: "label turns orange"
      card: "lift 3px (translateY) — never a shadow"
      carouselArrow: "button fills orange, the ink arrow inverts to white"
    active:
      pressable: "translateY(1px) on :active"
      card: "selected/active tile flips to a solid Digital Orange fill with white text"
    focus:
      rule: "keyboard :focus-visible shows the orange focus ring (shadow.focusRing); pill inputs thicken the border to 2px — no glow on mouse interaction"
    reducedMotion: "honour prefers-reduced-motion: reduce — disable all transitions/animation"

  # 5. Pill gradient rotation — the CTA / badge button vocabulary.
  #    Brand-coloured skillPills/badge/banner templates (colours baked in).
  pillRotation:
    type: "gradient-svg"
    templates:
      primary:         { template: "brand-pill-mixed",  height: 28, duration: "8s" }
      secondary:       { template: "brand-badge",        height: 24, duration: "6s" }
      accent:          { template: "brand-banner",       height: 26, duration: "6s" }
      live:            { template: "brand-pill-violet",  height: 22, duration: "6s" }
      source:          { template: "brand-pill-ink",     height: 22, duration: "6s" }
      caseStudy:       { template: "brand-pill-violet",  height: 22, duration: "6s" }
      badgePortfolio:  { template: "brand-pill-mixed",   height: 40, duration: "8s" }
      badgeLinkedin:   { template: "brand-pill-violet",  height: 40, duration: "8s" }
      badgeGithub:     { template: "brand-pill-ink",     height: 40, duration: "8s" }
      badgeEmail:      { template: "brand-pill-violet",  height: 40, duration: "8s" }
      badgeBook:       { template: "brand-pill-ink",     height: 40, duration: "8s" }
      badgeNewsletter: { template: "brand-pill-violet",  height: 40, duration: "8s" }
      badgeResume:     { template: "brand-pill-ink",     height: 40, duration: "8s" }
      badgeCoffee:     { template: "brand-pill-orange",  height: 40, duration: "8s" }
    useWhen: "CTAs, social badges, action pills."
    doNotUseWhen: "Inside body prose. As decoration. Outside Chan's own tools."

  # Banner registry — gradient-svg-generator banner configs used in
  # templates/partials/banner.hbs. Original animation styles, Caldera palette
  # (brand-* templates). Colours are baked into each template definition.
  banners:
    hero:           { template: "brand-hero",            height: 200, text: "Chan Meng",                             duration: "8s" }
    featuredWork:   { template: "brand-shimmer-orange",  height: 80,  text: "Featured Work",                          duration: "8s" }
    openSource:     { template: "brand-shimmer-violet",  height: 80,  text: "Open Source",                            duration: "8s" }
    skills:         { template: "brand-shimmer-glare",   height: 80,  text: "What I can do",                          duration: "8s" }
    freeTools:      { template: "brand-shimmer-glare",   height: 60,  text: "Free tools I built for the community",  duration: "6s" }
    soundIMake:     { template: "brand-shimmer-violet",  height: 60,  text: "Sound I make",                           duration: "6s" }
    visitorsHeader: { template: "brand-shimmer-orange",  height: 60,  text: "Visitors from around the world",         duration: "6s" }
    footerDivider:  { template: "brand-footer",          height: 240, text: "Thanks for visiting",                    duration: "8s" }

  # External own-tools (gradient-svg-generator / github-visitor-counter / github-readme-suno-cards).
  visitorCounter:
    username: "ChanMeng666"
    miniCounter: { theme: "transparent", maxflags: 5, displayMode: "miniCounter" }
    flagMap:     { theme: "github_dark", mapSize: "medium", displayMode: "flagMap" }
  sunoCards:
    handle: "chanmeng666"
    showProfileCard: false
    cardsSort: "play_count"
    cardsMax: 3
    theme: "dark"
    preset: "suno"

# -----------------------------------------------------------------------------
# IMAGERY — direction for photography / illustration. Mostly negative rules.
# -----------------------------------------------------------------------------
imagery:
  direction: >-
    Functional and abstract, with a risograph print feel. The signature
    treatment is a HALFTONE DOT GRADIENT — a two-stop ramp from Digital Orange
    (#FC5000) to Cyber Violet (#524AE9) rendered as a field of dots whose radius
    scales across the gradient, clipped to a 40px-rounded panel. Used for hero
    panels and card thumbnails (see public/brand/halftone-*.svg). Product
    screenshots and logos render as monochrome ink outlines or white fills inside
    ash-white cards — let the UI be protagonist. Flat and printed, never glossy;
    depth comes from surface color shifts, not shadows. Real assets over stock.
  approved:
    - "/public/brands/ (curated project + organization logos Chan controls)"
    - "/public/certificates/ (verified credential scans)"
    - "/public/tech-logos/ (third-party tech stack marks — used in pill-row context only)"
  forbidden:
    - "AI-generated portraits of Chan"
    - "Stock photography of generic 'tech' / 'business' scenes"
    - "Trophy / shields.io / wakatime / GitHub-streak badges (external decoration services)"

# -----------------------------------------------------------------------------
# ACCESSIBILITY — the contrast / interaction contract every generated surface
# must honour. WCAG 2.2 Level AA. The key gotcha: Citra Orange #FC5000 only
# clears AA against WHITE at LARGE sizes (3.3:1) — so small text on orange is
# always INK (#070607 → 6:1), white is reserved for large/bold numbers.
# -----------------------------------------------------------------------------
accessibility:
  standard: "WCAG 2.2 Level AA"
  rules:
    - "Body / small text must clear 4.5:1; large text (≥24px, or ≥18.66px bold) and UI/graphics must clear 3:1."
    - "Small text on the Digital Orange fill is Abyssal Ink (#070607 on #FC5000 = 6.06:1). Pure White on orange is 3.34:1 — use it ONLY for large/bold stat numbers."
    - "Small text on the Cyber Violet fill is Pure White (#FFFFFF on #524AE9 = 5.97:1); never ink (ink on violet is only 3.4:1)."
    - "Digital Orange is NEVER a text colour on a light surface (≤2.7:1) — only a block fill, a rule, or an underline/border accent."
    - "Keyboard focus is always visible via the orange focus ring (shadow.focusRing); state is never conveyed by colour alone (border-style, fill, and underline carry it too)."
    - "Honour prefers-reduced-motion: reduce — disable transitions and animation."

# -----------------------------------------------------------------------------
# SURFACES — what each output surface inherits and what it overrides.
# -----------------------------------------------------------------------------
surfaces:
  readme:
    canvas: "GitHub renders white; the basalt canvas applies only to images we control"
    fontHint: "GitHub controls typography — semantic tokens here are advisory for img/SVG only"
    signatures: ["heroBand", "halftone", "monoDatestamp", "monogramDivider", "pillRotation"]
  cv:
    canvas: "canvasPage basalt grey (print-tuned, recruiter-safe)"
    fontFamilies: ["display", "bodySans", "mono"]   # Bebas name + DM Sans body
    signatures: ["monoDatestamp"]
  webpage:
    canvas: "canvasPage basalt grey"
    fontFamilies: ["display", "bodySans", "mono"]
    signatures: ["heroBand", "halftone", "goldEyebrow", "monoDatestamp", "monogramDivider", "pillRotation"]
  socialCard:
    canvas: "canvasPage basalt grey"
    fontFamilies: ["display", "bodySans"]
    signatures: ["goldEyebrow"]
    note: "Square / 1.91:1 export. Bebas name + DM Sans label, one orange rule/chip."
