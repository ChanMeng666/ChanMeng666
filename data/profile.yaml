    name: Chinese Redefine 汉语新解 — AI Word Redefinition
    priority: 14
    category: ai-apps
    tagline: Full-stack AI app that reinterprets traditional Chinese vocabulary through Google Gemini, exports shareable SVG cards, gated by a two-layer rate-limit quota system, deployed on Cloudflare Workers via OpenNext
    repoUrl: https://github.com/ChanMeng666/chinese-redefine
    logo: /public/brands/chinese-redefine-v2.svg
    url: https://chinese-redefine.chanmeng-dev.workers.dev/
    extraLinks:
