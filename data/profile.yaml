  - id: ai-hackathon-assistant
    tier: primary
    recency: recent
    lastUpdated: "2026-05-19"
    name: Event Q&A AI Template — AI Hackathon Festival 2025 Assistant
    priority: 14
    category: ai-apps
    tagline: Industry-partnered AI event platform (AUT × AI Forum NZ × She Sharp) — interactive 3D quantum-orb sprite mascot with 6-tier affection gamification, OpenAI GPT-4o-mini streaming chat, Notion-as-database community FAQ, deployed on Cloudflare Workers
    url: https://ai-hackathon-assistant.chanmeng-dev.workers.dev/
    repoUrl: https://github.com/ChanMeng666/event-qa-ai-template
    logo: /public/brands/ai-hackathon-logo-full.svg
    extraLinks:
      - { label: "Hackathon partner — AI Forum NZ", url: "https://aiforum.org.nz/hackathon" }
      - { label: "Partner — AUT (host venue)", url: "https://www.aut.ac.nz/" }
