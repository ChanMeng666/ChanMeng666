      - { label: "Her Waka", url: "https://herwaka.shesharp.org.nz/" }
    logo: /public/experience/she-sharp-logo-purple-dark.svg
    entity: "She Sharp (charitable trust, founded by Dr Mahsa Mohaghegh / McCauley)"
    roles: ["Senior Full Stack Engineer", "Website Team Lead", "Solo Architect of New Platform"]
    techStack:
      - "Next.js 15.4"
      - "React 19.1"
      - TypeScript
      - "Drizzle ORM"
      - "Neon Postgres"
      - "NextAuth 5"
      - "GPT-4o-mini"
      - Stripe
