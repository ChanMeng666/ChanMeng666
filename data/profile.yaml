    tagline: Early-ecosystem Google News MCP server (shipped Dec 30, 2024) — listed across 10+ MCP catalogs, npm-published, with companion server-google-jobs
    url: https://github.com/ChanMeng666/server-google-news
    repoUrl: https://github.com/ChanMeng666/server-google-news
    extraLinks:
