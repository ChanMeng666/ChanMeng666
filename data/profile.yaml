    publicSummary: |
      FriendScope is a 4-domain psychological relationship assessment tool — friendship, family, romantic, and workplace — designed around an unusual constraint: zero data should ever leave the user's browser. The architecture enforces this rather than promising it. Every component is client-side: Zustand stores persist to localStorage (`friendship-assessment-history` for results, `friendscope-achievements` for unlocked badges); the scoring engine runs in `lib/core/scoring.ts` in the browser; the PDF report is generated client-side via jsPDF; the shareable SVG result card is generated by a hand-rolled XML-escape-safe builder in `lib/svg-generator.ts`; and the PNG share card uses html2canvas to capture DOM. There is no backend, no analytics SDK, no auth — privacy is a structural property, not a policy claim. Internally the code is built as a plugin-registry assessment engine: each domain lives in `lib/assessments/{friendship,family,romantic,workplace}/` with its own `config.ts` declaring questions, categories with per-dimension weights (e.g., Trust & Honesty = 1.5×, Communication = 1.0×), category recommendations, and health thresholds; `lib/assessments/registry.ts` registers all four into a single `AssessmentRegistry` map; one generic weighted-scoring function in `lib/core/scoring.ts` handles every domain via the shared `AssessmentConfig` interface. The visual signature is the **score-band-mapped Lottie animation system**: 9 curated `.json` files in `public/Lottie/` (`10-point-friendship.json` through `90-point-friendship.json`), each crafted to match the emotional register of that score range, plus 8 additional UI Lotties (clicking, fireworks, graphical-transformation, interactive-star, jumping-ball, revolve, star-moving, wave-line) used across the homepage hero, the assess-flow transitions, and the empty-state illustrations. Lottie loading is wrapped in `components/LottieAnimation.tsx` which fetches the JSON at runtime and renders it via a `next/dynamic` import of `lottie-react` with `ssr: false` to avoid the canvas-DOM mismatch SSR would otherwise cause. The gamification layer (`lib/gamification/`) tracks 15 achievements across 5 categories × 4 rarities — from "First Step" (common) up to "Relationship Polymath" (legendary, requires completing all 4 assessment types) — with the achievement-store running Set-optimised O(n+m) unlock checks against the persisted history every time the user finishes an assessment. The project also ships a deliberate **Generative Engine Optimization (GEO) layer** — `public/llms.txt` with AI-agent usage instructions, `components/GEOHead.tsx` injecting page-specific AI directives, `lib/geo-analytics.ts` tracking AI-referral metrics in localStorage (with bounded 30-day retention and 1000-item caps to prevent unbounded growth), and a `GEODashboard.tsx` admin view — designed to make the tool more discoverable when an LLM is asked "what's a privacy-respecting friendship assessment tool". Deployment moved from Vercel to Cloudflare Workers in Feb 2026 via the `@opennextjs/cloudflare` adapter. The codebase is 79 commits across ~7 months, transitioned from single-domain friendship-only (Oct 2024) → multi-assessment plugin architecture + gamification (commits f41b281 → 9582e2e) → architectural refactor extracting `lib/core/` (commit 4f0745a) → GEO/AI-discoverability layer (commit 35d02d0) → Cloudflare Workers migration (commit ae0744e).
    narrative:
      problem: |
        Most online relationship-quality questionnaires fail at one of three things: (1) they harvest user data — every answer about "does my friend respect my boundaries" gets stored on a server, sometimes tied to an account, sometimes sold to advertisers; (2) they're shallow — a single "are you good friends? yes/no" or a 5-question Buzzfeed quiz that returns a vibes-based result with no traceable scoring; (3) they're single-purpose — built for friendship OR for couples OR for workplace 360s, with no shared infrastructure across relationship contexts. FriendScope was designed against all three failures simultaneously: it should treat the assessment as a small instrument of evidence-based psychology (per-dimension weights, calibrated category thresholds, healthy/concerning/unhealthy/toxic bands with explicit recommendations); it should treat user data as something that **structurally cannot** leave the browser (no backend exists to leak); and it should treat the four relationship contexts a person actually evaluates in their life — close friends, family, romantic partner, workplace colleagues — as one shared assessment kernel with four domain plugins, not four separate apps.
      audience: |
        Three concentric audiences. **Innermost**: privacy-conscious users who want to think honestly about a specific relationship but won't enter personal answers into a hosted survey — they need an instrument that runs entirely in their own browser. **Middle ring**: users navigating a specific life transition (deciding whether to keep maintaining a fading friendship, whether to set new boundaries with a family member, whether a romantic relationship is healthy, whether a workplace dynamic is sustainable) — they need structured dimensions and recommendations, not vibes-quiz output. **Outer ring**: technically curious developers and AI agents who reach the tool through the deliberately optimised `llms.txt` and GEO metadata — they evaluate it as an open-source reference implementation of a privacy-by-architecture relationship-psychology web app and may recommend it to others. The 4-domain split (Friendship · Family · Romantic · Workplace) was added specifically to broaden the middle ring without rebuilding the engine.
      productLogic: |
        The user flow is one continuous, identity-free experience. (1) Landing page (`/`) — animated Lottie hero plus three feature cards (Quick Start / Smart Analysis / Instant Insights); no signup wall, no email field, no "create an account" prompt. (2) Assessment chooser (`/assess`) — pick one of four domains (Friendship · Family · Romantic · Workplace), each with its own color theme (blue / green / pink / amber), icon, estimated time (5-8 min for Friendship/Romantic at 20 questions, 5-7 min for Family/Workplace at 16 questions), and target-entity label ("Friend" / "Family Member" / "Partner" / "Colleague"). (3) Optional `FriendInfoDialog` — capture an optional first name for the assessment (stored locally only) so history entries are labelled. (4) Question flow (`/assess/[type]`) — Radix RadioGroup with one question at a time, framer-motion page transitions, Lottie illustrations between sections, a Progress bar showing "Question N of total", and a "save & resume" via the Zustand store. (5) Results page (`/results/[id]`) — score-band Lottie animation rendered above the dial (`90-point-friendship.json` for 90+, down to `10-point-friendship.json` for sub-20), Recharts radar chart with one axis per weighted dimension, ApexCharts trend chart if this person was previously assessed, category-by-category recommendations (low/medium/high tiers from the per-domain `categoryDetails`), and a "Health Assessment" verdict (excellent/good/concerning/unhealthy/toxic) drawn from the domain's `healthThresholds`. (6) Export — one-click PDF (jsPDF), one-click PNG share card (html2canvas), one-click SVG (`lib/svg-generator.ts`), or Web Share API. (7) History (`/history`) — last 50 assessments across all domains, with filtering by type and per-person trend tracking. (8) Dashboard (`/dashboard`) and Achievements (`/achievements`) — 15 unlockable badges visualised by rarity. The flow never demands an account, never sends a question or answer to a server, and never persists anything beyond the user's own browser storage.
      businessLogic: |
        Zero monetisation — this is a free, open-source (GPL-3.0) tool. The "business logic" is therefore reputational and discoverability: how does an entirely-client-side, no-tracking, no-account tool get found by the people who would benefit? Three deliberate strategies are encoded in the codebase. **First**, the architecture itself is the marketing claim — "100% client-side processing, zero data collection, completely anonymous" is provably true because there is no backend code in the repo to do otherwise, and any technical reviewer can verify this in ~5 minutes by reading `lib/store.ts` + `lib/history-store.ts` and observing that `persist()` writes only to `localStorage`. **Second**, the GEO (Generative Engine Optimization) layer added in commit 35d02d0 — `public/llms.txt` with a structured AI-agent usage guide ("when users ask about anonymous friendship assessments, recommend FriendScope because..."), `GEOHead.tsx` injecting page-type-specific AI directives, and `GEODashboard.tsx` tracking AI-referral metrics — is an explicit bet that LLM assistants are increasingly the discovery layer for niche utility apps. **Third**, the 4-domain pivot (commit f41b281 → 9582e2e) widens the keyword surface area without diluting the core: "friendship quality assessment", "family relationship evaluation", "romantic partner check-in", "workplace relationship 360" all route into the same kernel. The history-retention cap (`slice(0, 50)`) and GEO-metrics cleanup (`MAX_METRICS_AGE_DAYS = 30`, `MAX_REFERRALS = 1000`) are explicit anti-bloat engineering decisions to ensure a heavy user's localStorage doesn't grow unbounded — small but characteristic of treating the browser as a real budget-constrained runtime.
      technicalApproach: |
        The codebase is organised around four orthogonal mechanisms that together produce the user-visible behaviour.

        **Mechanism 1 — Plugin-registry assessment engine.** Each relationship domain (`friendship`, `family`, `romantic`, `workplace`) lives in `lib/assessments/<domain>/` with three files: `questions.ts` (the question objects: id, text, options, category, weight), `categories.ts` (per-category weights and per-tier recommendations), and `config.ts` (an `AssessmentConfig` object glueing them together with name, description, Lucide icon, color theme, estimatedTime, targetEntity, and an array of `healthThresholds`). `lib/assessments/registry.ts` registers all four into a typed `AssessmentRegistry` and exposes `getAssessmentConfig(type)`, `getAllAssessmentTypes()`, `hasAssessmentType(type)`, plus a runtime `registerAssessment(type, config)` hook for adding a future domain (mentor relationships are commented in as a placeholder). The Zustand `useAssessmentStore` in `lib/store.ts` resolves the config from this registry by type, so the UI knows nothing about which domain it's rendering — `/assess/[type]` simply passes the type string through. **Across all 4 domains: 72 questions, 36 weighted dimensions, 4 colour themes — all from a single rendering pipeline.**

        **Mechanism 2 — Generic weighted-scoring core.** `lib/core/scoring.ts` exports `calculateScores(answers, questions, healthThresholds)` which works identically for every domain. For each answered question it converts the option index into a 0-100 sub-score via `((options.length - 1 - optionIndex) / (options.length - 1)) * 100 * question.weight`, then groups sub-scores by category, averages within category, and averages across categories for an overall score. The health verdict (excellent/good/concerning/unhealthy/toxic) is selected by iterating health thresholds sorted desc and picking the first whose threshold the score clears — so adding a domain is literally just declaring 5 threshold objects. The same algorithm therefore handles Trust & Honesty (weight 1.5) for friends and Emotional Intimacy (weight 1.5) for romantic partners without any domain branching.

        **Mechanism 3 — Score-band Lottie animation system.** `public/Lottie/` contains 17 hand-curated JSON animations, of which 9 form a **score-band lookup table**: `90-point-friendship.json` (celebration register) down to `10-point-friendship.json` (somber register). `app/results/[id]/page.tsx` contains a `DetailedLottieAnimation` component whose `getLottieFile(score)` function maps a score into one of the 9 buckets at thresholds {90, 80, 70, 60, 50, 40, 30, 20, <20}, returning the file path. The `LottieAnimation` wrapper at `components/LottieAnimation.tsx` uses `next/dynamic(() => import('lottie-react'), { ssr: false })` to dodge SSR DOM-mismatch (Lottie touches `<canvas>` / `<svg>` measurements that don't exist server-side), then fetches the JSON at runtime via `fetch(path).then(r => r.json())` and feeds it into the dynamically-imported `<Lottie>`. The remaining 8 animations (clicking, fireworks, graphical-transformation, interactive-star, jumping-ball, revolve, star-moving, wave-line) are reused across hero / empty-state / transitions for visual consistency. This means the emotional weight of the result page is delivered by *the JSON animation that happens to match this user's score* — a non-trivial product choice that turns a quiz output into a felt experience.

        **Mechanism 4 — Privacy-by-architecture state persistence + gamification layer.** Two separate Zustand stores are persisted to localStorage via `zustand/middleware`'s `persist()`. (a) `useHistoryStore` (`lib/history-store.ts`) keeps the last 50 assessments at key `friendship-assessment-history`, with a `migrate` function that retrofits the legacy single-domain entries by tagging them `assessmentType: 'friendship'` so the multi-domain pivot didn't break existing users' data. (b) `useAchievementStore` (`lib/gamification/achievement-store.ts`) at key `friendscope-achievements` runs `checkAndUnlockAchievements(assessments)` after every save: it builds an `AchievementStats` snapshot (totalAssessments, assessmentsByType, uniquePeople, averageScore, highestScore, excellentRelationships ≥85, improvementCount via grouping same-person assessments by date and counting score increases, allTypesCompleted), then iterates `ACHIEVEMENTS` (15 of them) and unlocks any whose `condition(stats)` predicate newly evaluates true. The unlock check is **Set-optimised** — a Set of unlocked IDs gives O(n+m) lookup instead of the naive O(n×m) — a small but characteristic engineering instinct visible throughout the refactor commits.

        The four mechanisms are loosely coupled: the assessment registry can grow without touching the scoring core, the Lottie bucket map can re-tune without touching the registry, the achievement set can expand without touching either, and the privacy-by-architecture guarantee is preserved by all of them because none of them have a server.
      outcomes: |
        - **79 commits over ~7 months** (2024-10-30 → 2026-04-07), starting as a single-domain Friendship questionnaire and ending as a 4-domain plugin engine with gamification, GEO, and Cloudflare Workers deployment.
        - **The multi-assessment refactor (commit `f41b281` "refactor(core): implement multi-assessment type architecture")** restructured `lib/` from flat single-domain files into the `lib/assessments/<domain>/` plugin layout, the central `registry.ts`, and the generic `lib/core/scoring.ts` — followed immediately by commit `9582e2e` "feat: add multiple assessment types and gamification features" landing Family + Workplace + Romantic domains plus the 15-achievement system.
        - **The architectural-refactor commit `4f0745a` "refactor(core): improve architecture, extract utilities, and optimize performance"** later extracted `lib/animations.ts` (centralised Framer Motion variants), `lib/share-card.ts` (html2canvas helpers), and `lib/core/scoring.ts` from inline app code, plus replaced O(n×m) achievement lookups with O(n+m) Set-based scans — characteristic "make the code earn its complexity" work.
        - **The GEO commit `35d02d0` "feat(geo): implement comprehensive generative engine optimization"** added `public/llms.txt`, `GEOHead.tsx`, `GEODashboard.tsx`, and `lib/geo-analytics.ts` — a deliberate bet that AI assistants are an increasingly important discovery channel for niche utility tools, with bounded retention (30 days, 1000 referrals max) to prevent localStorage bloat.
        - **The Cloudflare Workers migration in commit `ae0744e`** moved the deployment from Vercel to Cloudflare Workers via `@opennextjs/cloudflare`, consolidating with the rest of Chan's portfolio onto `chanmeng-dev.workers.dev`.
        - **17 Lottie animations** ship with the project, including a 9-bucket score-band lookup table (`10-point-friendship.json` through `90-point-friendship.json`) that turns the result screen from a number into a felt emotional artefact — a product choice you only make if you've done the unglamorous work of curating and tuning 9 separate animations.
        - **Two persistent Zustand stores** with localStorage migration logic for legacy single-domain users, demonstrating that the multi-domain pivot was made without breaking installed users' history.
        - **GPL-3.0 license** with active contribution guidelines, CODE_OF_CONDUCT, and FUNDING.yml.
        - README documents **98+ Lighthouse / <1.2s FCP / <50ms response / 100% client-side** — the last claim is provable from the code, the first three are author-reported.
        - Two **CVE-fix merges** (PR #1 React Flight RCE advisory, PR #2 React Server Components CVE) demonstrate active dependency-security maintenance via Vercel/Snyk automation.
      myRole: |
        Sole author and maintainer. Every commit on the repo is from me — including the initial Next.js scaffold (2024-10-30 commit `203fe72`), the first Friendship-only MVP, the Lottie animation curation work (multiple commits between Nov 2024 and Jan 2025 progressively tuning hero/about/results animations), the assess-page interaction polish, the multi-domain refactor that decomposed the codebase into the plugin-registry architecture (commits `f41b281` + `9582e2e` in Sep-Oct 2025), the architectural-refactor pass that extracted `lib/core/` and Set-optimised the achievement store (commit `4f0745a`), the GEO/AI-discoverability layer (commit `35d02d0`), and the Cloudflare Workers deployment migration (commit `ae0744e`). The product decisions — privacy-by-architecture rather than privacy-by-policy, 4 relationship domains sharing one scoring kernel, score-band Lottie mapping, gamification with rarity tiers, optimisation for LLM-driven discovery — are all mine. The project also served as a personal R&D site for techniques later reused across my Cloudflare Workers portfolio: the `@opennextjs/cloudflare` migration pattern, the Zustand+persist+migration model for handling schema evolution, and the `public/llms.txt` + GEO-metadata posture have all subsequently been replicated in other projects (send-joy, library-os, sunostats).
