    position: Full Stack Developer & Lead Documenter (Lincoln University COMP693 Industry Placement)
    startDate: "2024-06"
    endDate: "2024-11"
    location: Canterbury, New Zealand
    url: "https://corde.nz/"
    logo: /public/organizations/corde-logo.jpg
    featured: true
