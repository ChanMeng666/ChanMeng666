    position: AI Instructor & Mentor
    startDate: "2026-04"
    endDate: null                       # null = present
    location: Newfoundland, Canada (remote instruction)
    url: https://www.technestcommunity.com/
    logo: /public/organizations/technest-community-logo.jpg
    featured: true
