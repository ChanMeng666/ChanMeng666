    status: live
    startDate: "2026-04"
    publicSummary: |
      Seismophone (codebase: sunostats) is an independent third-party
      observatory for AI-generated music, instrumented deepest on Suno. It
      captures Suno's public data daily and publishes free ecosystem readings
      the platform itself doesn't expose — how the trending feed has frozen,
      which model eras dominate, and who remixes whom — then points the same
      instruments at a signed-in creator's own catalog to produce a free public
      portfolio at /@handle plus seven credit-billed insight reports. Its
      distinctive dataset is a public Suno remix-lineage graph, recovered from
      a redaction gap in Suno's own API and now un-reproducible. Solo-built on
      Next.js 16 + Neon Postgres, trilingual (EN / 简中 / 日本語), self-hosted
      on a Docker + Traefik VPS, with a read-only MCP server for AI agents.
    narrative:
      impactHeadline: "Seismophone (repo: sunostats) — an independent observatory for AI music that publishes what the platforms won't: a public Suno remix-lineage graph recovered from a redaction gap in Suno's own API, now sealed and un-reproducible. Solo-built, self-hosted."
      problem: |
        AI-music platforms like Suno expose almost nothing about their own
        ecosystems. A creator gets a follower count and a play count; the
        structural data that would let them understand their catalog, trace a
        song's lineage, or read the platform's editorial behaviour is simply
        not published. Nobody outside Suno can answer basic ecosystem
        questions: is the "trending" feed actually live, which model eras
        dominate the charts, who remixes whom? Seismophone exists to measure
        that ecosystem from the outside and publish the readings openly — its
        stated stance is "we publish what the platforms won't."
      audience: |
        Two audiences on one set of instruments. First, anyone — no account —
        can read the free observatory: the fossil-watch "pulse," the preserved
        2024 trending exhibit, the model-era timeline, and the cross-author
        "who remixes whom" lineage graph. Second, signed-in Suno creators point
        the same instruments at their own catalog: they claim a handle, get a
        free public portfolio at /@handle, watch up to ten playlists with daily
        pulse diffs, and buy any of seven deep-dive insight reports on their own
        music. A third, machine audience is served deliberately: a public
        read-only MCP server lets external AI agents query the observatory
        without Seismophone bearing their inference cost.
      productLogic: |
        The product is one measurement apparatus pointed in two directions.

        **Outward (the observatory, free).** A daily pipeline captures Suno's
        public surfaces and turns them into published readings. `/pulse` is a
        "fossil-watch" — it treats Suno's `/api/trending` feed forensically,
        having proven it is a frozen September-2024 playlist object served fresh
        but never updated, and renders a cadence "seismograph," a model-version
        timeline, the longest-reigning #1, and tag-trend curves. `/trending`
        preserves the 2024 feed as a historical exhibit. `/observatory/
        who-remixes-whom` and the per-song `/lineage/[clipId]` explorer render
        Suno's real remix/derivation graph as a clickable SVG, walked
        server-side with recursive Postgres CTEs (bounded to a few hops each
        way); private clips appear only as anonymized nodes.

        **Inward (creator lenses).** A creator signs in with Google, claims
        their Suno handle, and instantly gets a free public portfolio at
        `/@handle` (themable, with configurable stats and tag filters). They
        then spend credits on seven single-purchase reports — Tag Optimization,
        Performance Snapshot, Method Mix, Song DNA, Persona Mix, Remix
        Readiness, and Model Era — each a deterministic analytics engine over
        their catalog, optionally topped with a short LLM "analyst's note."
        Every account starts with three free credits; reports are $1 (one
        credit) with no subscription, so a creator pays only for the specific
        questions they want answered.
      businessLogic: |
        The model is free-observatory-plus-microtransactions, not a
        subscription. Everything ecosystem-level and every public creator
        portfolio is free forever; the only paid surface is the seven
        per-catalog insight reports at $1/credit, sold in Stripe packs (Starter
        5 / Pro 20 / Bulk 50) with three credits granted free at signup. The
        defensible asset is the lineage archive: because it was recovered from
        a redaction gap Suno has since closed, it is a sealed, un-reproducible
        dataset — a genuine data moat rather than a feature a competitor can
        re-derive. Distribution is deliberately agent-native: the read-only MCP
        server turns the observatory into a tool other people's AI agents can
        call, extending reach without ad spend, while the trilingual surface
        (EN / 简中 / 日本語) reaches Suno's large East-Asian creator base.
      technicalApproach: |
        A Next.js 16 (App Router, pinned to Webpack + `output: standalone`) app
        in React 19 and TypeScript 5, over a single 17-table Drizzle schema on
        Neon serverless Postgres. Auth is NextAuth v5 + Neon Auth (Google OAuth
        only); payments run through Stripe with a webhook-verified credit
        ledger; Resend delivers report emails; an optional OpenAI `gpt-5.4-nano`
        pass narrates otherwise numbers-only reports.

        **The lineage harvest is the crux.** Suno's serializer redacts clip
        parent-UUIDs to the all-zeros UUID on its main endpoints, but misses
        that pass on exactly two response shapes — the slim clips of
        `/api/trending` and the `personas[].clip` sub-trees of a public profile.
        A dedicated parser path (the *only* sanctioned one) extracts the four
        real parent-pointer types from those shapes, filters out zero-UUIDs,
        and deduplicates them into a directed-edge table with an idempotent
        unique constraint; the public graph is then walked with `WITH RECURSIVE`
        Postgres CTEs. Ingestion is strictly compliant — only W3C
        oEmbed-discovered public endpoints, anonymous and CORS-enabled, at a
        once-daily cadence, with no scraping, credentials, or headless browser,
        and listing-level privacy always respected.

        **Money-path and reverse-engineered-API correctness are hardened
        deliberately.** Concurrent double-charges are blocked by a partial
        unique index over in-flight report claims; balances debit via
        optimistic `UPDATE … RETURNING` with a sub-zero rollback; Stripe
        idempotency is enforced two ways (a unique ledger index plus a
        processed-events dedupe log); generator failures auto-refund. Because
        the whole product depends on Suno's unofficial response shapes, a weekly
        schema-drift canary alerts when they change, and a durable cron-runs
        table provides leasing and observability that Neon's HTTP driver can't.
        The app self-hosts as a multi-stage Docker image (Node 20 slim,
        non-root) behind Traefik + Let's Encrypt, shipped via GHCR and GitHub
        Actions, with five daily/weekly cron pipelines; the trilingual
        dictionaries are TypeScript-checked so a missing translation key fails
        the build.
      outcomes: |
        Live at seismophone.chanmeng.org, solo-built across 99 commits over
        roughly three months (2026-04-12 → 2026-07-10). The apparatus runs 19
        pages, 28 API route handlers, 56 components, and five cron pipelines
        over a 17-table schema, plus a 7-tool read-only MCP server. Its
        signature result is the sealed remix-lineage archive — ~102 real
        parent→child edges recovered in a single 2026-05-09 backfill before Suno
        closed the redaction gap — which makes the public lineage explorer a
        dataset that, by construction, cannot be collected again. The build also
        went through structured hardening waves (Codex-reviewed) covering
        credits, privacy, query performance, observability, and the
        schema-drift canary. The forensic teardown of Suno's frozen `/api/
        trending` fossil is itself a published finding, reframing a stale API
        into a monitored artifact.
      myRole: |
        Sole author of the entire system — product concept and "observatory"
        positioning, the lineage-harvest discovery and parser, the 17-table
        schema and daily ingestion pipeline, all seven insight engines, the
        Stripe credit ledger and its concurrency hardening, the recursive-CTE
        lineage graph and SVG explorer, the read-only MCP server, the trilingual
        i18n system, and the self-hosted Docker + Traefik deployment with its
        cron and observability tooling. 99 of 99 commits are mine.
