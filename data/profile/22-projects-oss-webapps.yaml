    publicSummary: |
      LinkedIn Jobs Search is the architectural inversion of a typical web app: instead of an SPA with a "developer API" tacked on, it ships **one Cloudflare Worker that exposes four surfaces of equal weight** — a React SPA at `/` for humans who click-and-type, an OpenAPI 3.1 HTTP API at `/api/*` with Scalar docs at `/docs`, an MCP Streamable HTTP server at `/mcp` with 11 tools, and an `lja` CLI on npm with 8 commands. **Every operation a human can do by clicking, an AI agent can do by HTTP call, MCP tool, or CLI invocation, with full feature parity.** Search jobs across 30+ countries, save them, update application status, list saved jobs, export to CSV/JSON, list search presets, list search history, view subscription — every primitive exists on every surface. The 11 MCP tools (`search_jobs`, `list_countries`, `list_saved_jobs`, `save_job`, `update_saved_job_status`, `delete_saved_job`, `export_saved_jobs`, `get_subscription`, `list_search_presets`, `save_search_preset`, `list_search_history`) **mirror the HTTP routes 1:1**, and the 8 `lja` CLI commands **mirror the MCP tool names 1:1** — the same vocabulary across every surface, so an agent's plan-of-action translates verbatim from one to another. The two audiences share a single `lja_<keyId>_<secret>` API key model: humans **mint** keys in the SPA dashboard (cookie-auth UI; one-time plaintext display; only the sha256 of the secret is stored), then **use** those keys to drive the HTTP API, MCP, or CLI. Cookies authenticate the SPA only and are deliberately ignored whenever any `Authorization` header is present (a malformed Bearer always returns 401, never falls through to cookie auth — a structural decision so agents and humans cannot accidentally cross-authenticate). The platform has its own `/guide` page that splits into two parallel tracks ("For humans" and "For agents and developers") with TOC + hash-jump nav, and the homepage itself uses a "dual-track feature catalog" layout that visually mirrors the same dichotomy. The codebase has been through 259 commits and a Vercel→Cloudflare Workers migration, and the last ~2 weeks shipped **8 design-doc-driven sub-projects (A → H)** that brought it from "an SPA that happens to expose an API" to "a four-surface monolith with full agent ergonomics": A added the agent surface (RFC 7807 errors with stable codes, ULID request IDs, `resolveCaller()` middleware, api_keys table, OpenAPIHono migration, MCP server, lja CLI); B replaced subscription tiers with Stripe metered billing (usage_events table, canonical-JSON + sha256 idempotency, `X-Quota-*` headers, per-event metering); C replaced wrangler.jsonc with Pulumi TypeScript + a CrossGuard policy pack of 4 policies (no-destroy-prod, secret-must-be-secret, worker-vars-no-cleartext-secret, worker-name-must-match-stack); D added R2-backed exports with HMAC-signed presigned URLs and a two-step download flow propagated through Worker + MCP + CLI; E added a SWR cache module with `X-Cache: HIT|REVALIDATING|MISS` headers and a global cost-class-aware rate-limit middleware; F built the test infrastructure (`node --test --experimental-transform-types`, contract suite via in-process `app.fetch` dispatch); G stripped 3D-globe decoration and built the dual-track landing + `/docs` (Scalar) + `/mcp` static onboarding routes; H built the visitor onboarding (homepage feature-catalog, dual-track `/guide`, API keys tab in the dashboard with one-time-plaintext mint + revoke confirmation flows, subtitle + first-visit empty-state on every primary page). Each sub-project has a paired design spec and implementation plan under `docs/superpowers/`.
    narrative:
      impactHeadline: "Dual-audience job platform serving both humans (web UI) and AI agents (11 MCP tools + HTTP API + CLI) as equal-weight surfaces — outcome-metered usage events via Stripe, Pulumi CrossGuard guardrails, single-Worker monolith on Cloudflare. 259 commits across 17 months."
      problem: |
        Job search is one of the obvious near-future "AI agent" use cases — give an LLM a goal ("find me a remote rust job paying over $150k that posts in the next 24 hours, save it, and email me"), let it iterate. But every existing job board (LinkedIn, Indeed, Wellfound, etc.) is built for human eyes only: HTML pages with hostile scraping defenses, no public API, no machine-readable error codes, no usage quotas an agent can negotiate. The few APIs that do exist treat agents as second-class — buried under a "developer portal" tab on a human-first site, with feature gaps between what humans can do in the UI and what agents can do via API, and no MCP layer to make them plug-and-play with Claude Desktop / Cursor / Inspector. The opportunity: build the *opposite* — a job-search platform where the human and the agent are equal-weight users of the same backend, where every UI button has a 1:1 HTTP endpoint and a 1:1 MCP tool and a 1:1 CLI command sharing one stable vocabulary, where errors are stable machine-readable codes (RFC 7807) rather than HTML pages, where quotas appear as response headers (`X-Quota-*`) the agent can read and plan around, and where onboarding has explicit "For humans" and "For agents" tracks. That product framing — "humans and agents are equal first-class citizens, not a primary audience plus a developer afterthought" — is the unique architectural commitment of this project.
      audience: |
        Two **equal-weight** audiences, by deliberate design. **Audience 1 — humans** who are job-hunting and want a clean React SPA: sign in via Google or GitHub OAuth, type a keyword and location, filter by job type / experience level / salary / remote / posted-since / sort-by, search across 30+ countries (or multi-country in one call), save jobs with application-status tracking, save search presets, replay search history, export to CSV/JSON, manage their Stripe subscription. **Audience 2 — AI agents and the developers building them** who want to issue the same operations programmatically: Claude Desktop / Cursor / Inspector users plug the MCP URL into their config and immediately have 11 tools available; CI/CD pipelines `npm i -g @chanmeng666/linkedin-jobs-search-cli` and call `lja search --keyword rust --location Remote` returning bare JSON envelope-unwrapped on stdout with stable exit codes; programmatic scripts use the OpenAPI 3.1-described HTTP API directly. The product surface is explicitly **dual** — the `/guide` page has two TOCs side-by-side ("For humans" and "For agents and developers"), the homepage layout is a "dual-track feature catalog" (commit `H.7`), the `/connect` page hosts paste-ready MCP configs, and the `/docs` page is interactive Scalar reference. There is no second-class citizenship — every feature that exists in the SPA exists on the agent surfaces, and the operational vocabulary (`search_jobs`, `save_job`, `export_saved_jobs`...) is the same across MCP, CLI, and the names of the corresponding HTTP routes.
      productLogic: |
        The user flow is **one product, two onboarding tracks**. (1) **Human track**: visit linkedin-jobs-search.chanmeng-dev.workers.dev → "Sign in" (Google or GitHub OAuth via Stack Auth — no email/password, no 2FA prompt, no email-verify step) → `/search` (anonymous visitors can do single-country search; signed-in users unlock multi-country + save + history + presets + export + API key management) → click "Save" on a job card → it appears in `/dashboard` (jobs tab + history tab + presets tab + API keys tab + usage tab) → optionally hit "Export CSV" → optionally hit `/billing` for Stripe metered subscription → at any point, hit `/dashboard` "API keys" tab to mint an `lja_*` token (one-time plaintext display — copy-paste it once, server only stores the sha256). (2) **Agent track**: visit `/connect` for paste-ready Claude Desktop / Cursor / MCP Inspector configs → drop in your `lja_*` token → the 11 MCP tools light up → call them with the same vocabulary the SPA uses internally. **Or** `npm i -g @chanmeng666/linkedin-jobs-search-cli` → set `LJA_API_KEY` and `LJA_BASE_URL` envvars → run `lja search --keyword rust --location Remote` → bare JSON on stdout, RFC 7807 problem+json on stderr, exit code matches the wire `code` field (0 ok / 1 unauthorized / 2 forbidden / 3 not_found / 4 validation_error / 5 quota_exceeded / 6 rate_limited / 7 internal_error / 8 IO error / 9 unknown / 10 invalid_token / 11 expired_token / 12 export_expired). **Or** issue raw HTTPS to `POST /api/jobs` with `Authorization: Bearer lja_*` — same response envelope, same `X-Quota-*` and `X-RateLimit-*` and `X-Cache` headers, same OpenAPI 3.1 schema documented at `/openapi.json` and rendered at `/docs` via Scalar. The deep product insight: **the human surface and the agent surface aren't separate products with a shared backend — they're two onboarding ramps onto the same primitives**, and the `/guide` page explicitly walks both paths step by step with a TOC and hash-jump nav so a visitor can self-select their track in 5 seconds.
      businessLogic: |
        **Outcome-metered access model** — every successful `job_search.success` event (one per returned country) and every `export.completed` event counts against a monthly quota measured in UTC calendar months. **Free tier** covers 50 searches + 5 exports per month with no card required. **Metered tier** scales granularly per-event past an included 1,000 searches + 100 exports budget — no per-seat fee, no flat monthly minimum, no tiered "Pro" plan. Every quota signal is a granular per-call event that exactly mirrors the platform's own usage surface (LinkedIn upstream + Workers compute + Neon + R2 + Stripe). The metering machinery (sub-project B, commits B.0 → B.31) is engineered with structural care: a `usage_events` table records every event with a `canonical_request_sha256` for idempotency (so a retry never double-counts), a cron-based dead-letter retry sweeps any events that failed to flush to Stripe, response `X-Quota-Remaining` headers let agents budget their next call without a separate /me endpoint round-trip, and the `STRIPE_MODE=test|live` env-var switch lets the live flow be tested end-to-end before flipping a customer cohort. The agent-vs-human distinction also has access consequences encoded in the auth model: **the MCP endpoint requires a Bearer key** (cookie users get 403 — agents can't accidentally use SPA-session cookies), and **the key-management routes require a cookie session** (Bearer keys get 403 — agents can't mint their own keys, only humans can, so key issuance is always trackable to a human session). This is the structural answer to "how do you build a platform where agents are first-class but humans retain control of issuance".
      technicalApproach: |
        The system is organised around four orthogonal mechanisms.

        **Mechanism 1 — Single Worker, four surfaces.** `worker/index.ts` mounts one `OpenAPIHono` app with: 9 route modules (`api-keys`, `billing`, `export`, `export-download`, `health`, `image-proxy`, `jobs`, `stripe-webhook`, `user`) handling `/api/*`; a `/mcp` Streamable HTTP MCP server (sub-project A.6) registering 11 tools whose implementations build internal `Request` objects and call `app.fetch(req, env, ctx)` to dispatch back into the same Hono app (so the MCP tool path goes through every middleware — observability, auth, rate-limit — exactly as an external HTTP call would, no shortcut); a `vite` build that emits a React 18 SPA served by the same Worker as static assets via `@cloudflare/vite-plugin`; and a scheduled cron handler for the metered-billing dead-letter retry. The lja CLI is a separate npm workspace under `cli/` (`@chanmeng666/linkedin-jobs-search-cli`, binary `lja`) that hits the same HTTP endpoints over the wire. Result: **one codebase, one deploy, one Hono app, one set of routes** — but four surfaces with full feature parity.

        **Mechanism 2 — Locked vocabulary across surfaces.** The 11 MCP tool names (`search_jobs`, `list_countries`, `list_saved_jobs`, `save_job`, `update_saved_job_status`, `delete_saved_job`, `export_saved_jobs`, `get_subscription`, `list_search_presets`, `save_search_preset`, `list_search_history`) are explicitly marked LOCKED in `worker/mcp/tools.ts` (renames are breaking contract changes for every deployed agent); the 8 CLI commands (`search`, `countries`, `saved {list|save|update|delete}`, `export`, `subscription`, `presets {list|save}`, `history`, `keys`) deliberately preserve those same names; the underlying HTTP routes use parallel paths (`POST /api/jobs` ↔ `search_jobs`, `POST /api/user/saved-jobs` ↔ `save_job`, `POST /api/export` ↔ `export_saved_jobs`, etc.). The OpenAPI 3.1 spec is derived from the same Zod schemas the routes validate against (every route uses `OpenAPIHono` + `createRoute`, sub-project A.5 commits `3aec6ce` → `4eaced3`) — so the `/docs` page rendered by Scalar, the `/openapi.json` document, the MCP tool input schemas, the CLI's argument validation, and the runtime request validation are all sharing one source of truth. **Agents and humans speak the same language by construction, not by documentation.**

        **Mechanism 3 — Agent-friendly response contract.** Every API response carries machine-readable signals an agent can plan against without parsing prose. **Success** envelope is `{success: true, data: <payload>}` (uniformly across HTTP/MCP, with the CLI unwrapping `data` on stdout); the one exception is the Stripe webhook which echoes Stripe's raw shape because Stripe's own validator parses it. **Errors** are RFC 7807 `application/problem+json` with a stable `code` field — 10 codes are locked across the platform (`unauthorized`, `forbidden`, `not_found`, `validation_error`, `quota_exceeded`, `rate_limited`, `internal_error`, `invalid_token`, `expired_token`, `export_expired`), CLI exit codes 0-12 mirror them, MCP tool calls surface them as `isError: true` tool responses. **Headers** carry stateful signals: ULID `req_<26-char>` in `X-Request-Id` + every JSON-line log + problem+json `trace_id`; `X-Quota-Remaining` / `X-Quota-Limit` for the monthly metered budget; `X-RateLimit-Remaining` / `X-RateLimit-Limit` for the per-minute KV-backed cost-class-aware limiter (5 points for the expensive `POST /api/jobs` and `POST /api/export`, 1 point elsewhere — globally mounted in sub-project E.5); `X-Cache: HIT|REVALIDATING|MISS` on cached routes (sub-project E.6's SWR module). **Auth precedence** is deliberately rigid: cookies authenticate the SPA only and are **ignored** whenever any `Authorization` header is present, so a deliberately malformed Bearer always returns 401 and never silently falls through to a cookie session (commit A.4 — `parseApiKey` → `resolveCaller`, KV-coalesced `last_used_at`).

        **Mechanism 4 — Infrastructure as code with policy guardrails.** Sub-project C replaced `wrangler.jsonc` with **Pulumi TypeScript** (`infra/index.ts` + `infra/src/{config,kv,r2,secrets,worker}.ts`) as the primary deploy path (`npm run deploy` = `vite build && pulumi up --cwd infra --stack prod --policy-pack ./infra/policies --yes`); the legacy `deploy:wrangler` stays as a fallback escape hatch. A **Pulumi CrossGuard policy pack** of 4 policies — `no-destroy-prod` (every prod resource must have `protect: true`; pivoted in commit `2026-05-09 22:14:06` from a destroy-rejection rule to a structural protect-on-all-prod-resources requirement), `secret-must-be-secret` (any `secret_text` binding must be marked as a Pulumi secret, not cleartext), `worker-vars-no-cleartext-secret` (Worker plain `vars` can't carry anything looking like a secret), `worker-name-must-match-stack` (so prod and dev never collide) — gates every `pulumi preview` in CI (`.github/workflows/pulumi.yml`). Each policy has a dedicated unit test (`*.test.js`). Plus **24 encrypted Pulumi secrets** in `Pulumi.prod.yaml` (commit `2026-05-09 21:48:16`), inline `import` opts on KV/Worker/cron resources so existing live infra was adopted in place without re-creation, and a Cloudflare R2 bucket with a 1-day lifecycle for export artifacts. The test infrastructure (sub-project F) uses **`node --test --experimental-transform-types`** (no Jest, no Vitest, no transformer) — unit tests colocated next to source files for `parseApiKey`, `parse/hash/generate` key helpers, `problem/toProblemResponse` RFC 7807 envelope, `planLimitError` entitlements, `X-Quota-*` header builder, pricing snapshot lock for Stripe meter names, `classifyAuthSource` — plus a cross-cutting **`worker/contract.test.ts`** using in-process `app.fetch` dispatch across 4 test groups (so the same code path the MCP server uses to call back into Hono is the path the contract suite exercises).

        The four mechanisms compound: the single-Worker monolith means every operation is implementable once and reachable from every surface; the locked vocabulary means the implementation language is the same as the user-facing language; the agent-friendly response contract means agents can plan against the platform without a custom parser; and the Pulumi+CrossGuard layer means none of the above can be accidentally broken in production.
      outcomes: |
        - **259 commits over ~17 months** (2024-12-22 → 2026-05-10), with a sustained 8-sub-project sprint (A→H) in the final two weeks (2026-04-28 → 2026-05-10) that converted a single-audience job-search SPA into a true dual-audience platform.
        - **Sub-project A (agent surface, 2026-04-28)**: RFC 7807 errors + ULID request IDs (A.1) → `resolveCaller()` middleware + Caller union (A.2) → api_keys table + cookie-auth CRUD (A.3) → KV-coalesced `last_used_at` (A.4) → OpenAPIHono migration of every `/api/*` route (A.5) → **`/mcp` Streamable HTTP server with 11 tools** (A.6) → **`@linkedin-jobs-search/cli` npm workspace + `lja` binary** (A.7) → llms.txt agent contract (A.8).
        - **Sub-project B (metered billing, 2026-05-05/06)**: usage_events table (B.1) → PRICING constant + meter names (B.2) → canonical-JSON + sha256 idempotency (B.3) → getQuota / requireQuota + rate-limit headers (B.4) → idempotent usage recorder + paid Stripe meter push (B.5) → per-country metering for `POST /api/jobs` (B.7) → drop csvExport gate; meter `export.completed` (B.8) → `/billing` 3-line-item metered shape (B.9) → metered webhook detection (B.10) → cron dead-letter retry (B.12) → drop PLANS map (B.14) → remaining-quota indicator in SPA (B.19) → Stripe bootstrap + live audit gate (B.21-B.22) → metered pricing page (B.30).
        - **Sub-project C (Pulumi + CrossGuard IaC, 2026-05-09)**: scaffold infra workspace → CrossGuard policy pack with 4 policies (each with unit tests) → 24 encrypted Pulumi secrets → inline import opts for in-place adoption of live resources → pivot `no-destroy-prod` from rejection to structural `protect: true` enforcement.
        - **Sub-project D (R2 exports, 2026-05-10)**: HMAC-signed download tokens (D.1) → R2 put/get wrappers (D.2) → `EXPORTS` binding + `EXPORT_DOWNLOAD_SECRET` (D.3) → invalid/expired token codes (D.4) → `GET /api/export/download/:token` (D.5) → `POST /api/export` returns R2 URL JSON envelope (D.6) → MCP and CLI propagate the two-step flow (D.7, D.8, D.9) → 1-day R2 bucket lifecycle (D.13).
        - **Sub-project E (perf + rate limit, 2026-05-10)**: SWR cache module (E.1) → rate-limit core + cost classes (E.2) → rename `X-RateLimit-*` → `X-Quota-*` for monthly quota, keep `X-RateLimit-*` for the per-minute limiter (E.3) → rate-limit middleware (E.4) → mount globally (E.5) → SWR cache + `X-Cache` header in jobs route (E.6) → atomic multi-country quota check (E.7).
        - **Sub-project F (tests, 2026-05-10)**: extract test helpers (F.1) → unit tests for api-key parse/hash/generate (F.2), problem envelope (F.3), planLimitError (F.4), X-Quota header builder (F.5), pricing snapshot (F.6), `classifyAuthSource` (F.7) → contract suite via in-process `app.fetch` dispatch (F.8) → CI typecheck + test:worker (F.9).
        - **Sub-project G (frontend strip, 2026-05-10)**: removed 3D globe + three.js dependency, dual-track landing page, `/docs` route with Scalar API reference, `/connect` MCP onboarding route, Docs/MCP/OpenAPI/CLI footer links.
        - **Sub-project H (visitor onboarding, 2026-05-10)**: book-icon `/guide` route → humans track + agents track with TOC + hash-jump nav → dual-track feature-catalog homepage → API keys tab in dashboard (skeleton → list → mint with one-time plaintext → revoke with confirm) → first-visit empty-states + subtitles on every primary page (search, dashboard, usage, billing, connect) → MCP tool name correctness final-review.
        - **Platform migration**: Vercel + Node.js + Express → Cloudflare Workers + Hono in early 2026 (commit `2026-01-21`), with the migration walkthrough preserved at `docs/MIGRATION_GUIDE_VERCEL_TO_CLOUDFLARE.md`.
        - **CLI published to npm as `@chanmeng666/linkedin-jobs-search-cli`** (renamed from `@linkedin-jobs-search/cli` in commit `2026-05-05 20:05:57`), `lja` binary, both `LJA_API_KEY` + `LJA_BASE_URL` required at v0.x (a deliberate choice not to bake the personal `*.workers.dev` URL into the published package — bumps to v1.0 when a project-owned domain is provisioned).
      myRole: |
        Sole author, designer, and operator. Every one of the 259 commits is mine. The unique architectural commitment — *humans and agents are equal first-class citizens, not a primary audience plus a developer afterthought* — is my product call, and it's the call that organises every sub-project below it. I designed and wrote the 4-surface monolith (single Hono app + MCP server + CLI workspace + React SPA all sharing the same routes); designed the 11-MCP-tool catalog with explicit `LOCKED` contract semantics so renames are breaking changes; designed the `lja_<keyId>_<secret>` key format (ULID keyId + 32-byte URL-safe-base64 secret, only the sha256 stored server-side); designed the cookie-vs-Bearer auth precedence (cookies ignored when any Authorization header is present, MCP requires Bearer, key-management requires cookie — so agents can't mint their own keys); designed the 10-stable-error-code catalogue + 0-12 CLI exit-code mapping; wrote the OpenAPIHono migration across every `/api/*` route (sub-project A.5); ran the design-doc → implementation-plan → ticketed-commit workflow that produced the 8 sub-projects A→H in the final 2-week sprint (each with a paired design spec at `docs/superpowers/<letter>-spec.md` + implementation plan at `docs/superpowers/<letter>-plan.md`); wrote the Pulumi TypeScript IaC + the 4-policy CrossGuard pack including the deliberate pivot from rejection-based to structural `protect: true` enforcement; wrote the contract test harness using in-process `app.fetch` dispatch; wrote the dual-track `/guide` page + the dual-track feature-catalog homepage that visually mirrors the same dichotomy; published the CLI to npm under my own scope; and operate the production deployment. The "humans and agents are equal" framing has since influenced subsequent projects in my portfolio — the CLI-first agent-friendly response contract reappears in `lighthouse-as-a-service` style projects, and the MCP-tools-mirror-HTTP-routes pattern is reused in other tooling work.
