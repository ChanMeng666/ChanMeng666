    publicSummary: |
      FanFic Lab (live at https://fanfic-lab.tech) is a full-stack AI co-creation community built specifically for the *Honkai: Star Rail* (崩坏：星穹铁道) fandom — the most popular HoYoverse game in China during the project window. The 182-commit codebase compresses three usually-separate things into one product: (1) **an adaptive LangGraph.js agent named "DreamWriter"** that takes a Chinese natural-language prompt like "想看砂金和藿藿的现代AU虐转甜" and runs it through a 7-node graph (intent parser → story architect → writer → quality guard → conditional revision loop → summarizer → delivery), where the quality-guard node uses GPT-4o-mini to score the draft 1-10 against an HSR canon knowledge prompt and either passes the story through or sends it back to the writer for up to MAX_REVISIONS=2 self-corrections; (2) **a hand-curated fandom knowledge pack** at `src/knowledge/hsr/` containing 5 deeply-modeled HSR characters (砂金 / 藿藿 / 丹恒 / 景元 / 花火) with personality / speech-pattern / emotional-trigger / relationship maps + 4 relationship dynamics + 5 world-rule categories (命途体系, etc.) + 5 trope templates (现代AU, ABO, Hurt/Comfort, 豆花/甜饼, 前世今生/命运轮回), composed into a system prompt by a `toSystemPrompt()` method and combined at runtime with **RAG over a `KnowledgeChunk` pgvector table** (1536-dim `text-embedding-3-small` vectors, retrieved by the writer node before drafting); and (3) **a UGC community layer** with Stack-Auth identities, public follows, public author pages, nested-reply comments + comment likes + spam protection, in-app notifications with a bell + page, per-reader font/line-height/scroll-position preferences, dark mode, per-story view tracking, pgvector-cosine related-story recommendations, pg_trgm GIN-indexed search, and SEO/OG tags + sitemap. The whole thing is split into **two Docker services** — `web` (Next.js 16 frontend + API routes) and `agent` (LangGraph CLI runtime on port 8123) — wired together via Docker Compose internal networking, self-hosted on a **DigitalOcean VPS via Coolify** behind Cloudflare proxy-mode SSL, with GitHub Actions building both images to GHCR and SSH-deploying on every `git push master`. The migration from Railway to DigitalOcean+Coolify (commit `734e69c`, 2026-04-03) is documented in a 600+-line `docs/MIGRATION_RAILWAY_TO_DIGITALOCEAN.md` playbook that doubles as a reusable Claude-Code automation reference. Before the HSR DreamWriter pivot in commit `a288e25` (2026-03-23), the project shipped as a more generic CopilotKit + LangGraph fandom-agnostic editor with HITL approval cards, Tavily fandom research, and a creative wizard — that earlier work survives in `docs/COPILOTKIT_LANGGRAPH_HITL_GUIDE.md` and informed the current agent design. The pivot commit `b5baf34` the same day deliberately removed the old editor/wizard/generator code, demonstrating willingness to delete working code when a sharper product direction emerges.
    narrative:
      impactHeadline: "Adaptive LangGraph agent for Chinese fanfiction creators — 7-node quality-loop graph over a hand-curated Honkai: Star Rail canon + pgvector RAG, plus a follower/comment/recommendation community shipped as a lean two-service Docker stack self-hosted via DigitalOcean + Coolify."
      problem: |
        The Chinese gaming fanfiction (同人文) scene around HoYoverse titles — and *Honkai: Star Rail* / 崩坏：星穹铁道 in particular — has two structural problems that generic AI writing tools don't solve. **First**, generic LLM creative writing assistants (CopilotKit-style autosuggest, ChatGPT, Claude) have no deep grounding in HSR canon: they default to surface-level character clichés ("cold prince" / "shy boy"), get the speech patterns and emotional triggers wrong (e.g., they don't know that 砂金 stops speaking softly when 黑天鹅 is threatened, or that 藿藿's stutter is canon-specific), and routinely produce OOC (out-of-character) drafts that any serious fanwriter rejects. **Second**, existing fanfiction platforms (LOFTER / AO3 / 长佩) are *reading* communities, not *creation* communities — they host finished work, but they don't lower the activation energy for the much larger group of fans who want to consume CP (couple/ship) content but find a blank page intimidating. The opportunity: build a platform where any fan can type "I want to read 砂金 × 藿藿 现代AU 虐转甜 HE" in Chinese, get back a canon-respecting 3000-word draft in 60 seconds, edit it, publish it, and have other fans like/comment/follow them. That requires solving the OOC problem at the agent level (canon knowledge baked in, plus a self-revising quality loop) and the activation-energy problem at the product level (one-shot prompt → finished story → save → publish). FanFic Lab is the answer.
      audience: |
        Three concentric circles. **Innermost**: the 同人圈 (fandom writers' circle) for *Honkai: Star Rail* — typically Chinese-speaking female fans of HoYoverse games who lurk on LOFTER / Weibo / Bilibili, who already know who 砂金 / 藿藿 / 丹恒 are, who have CP preferences and trope preferences (现代AU / ABO / Hurt-Comfort), and who want a co-writer that won't break their characters. **Middle ring**: consumers who like reading HSR fic but never wrote any — they get the one-prompt-to-finished-story path and become first-time creators, then liking/commenting on others' work pulls them into the community. **Outer ring**: the broader gaming-fanfic and CN-creative-writing community who can adopt the same architecture for other fandoms (the `src/knowledge/` directory is deliberately structured as `base/types.ts` + per-fandom packs, with HSR as the only currently-shipped pack but mentor / 原神 / 鸣潮 packs as natural future expansions — `FandomKnowledge` is a typed interface, not an HSR-hardcode). The Chinese-first product surface is a deliberate choice: prompts, system messages, character data, world rules, even the agent's internal log messages ("正在根据反馈修改第 X 版...") are all in Chinese, because the audience is.
      productLogic: |
        The user flow collapses what would normally be 4-5 separate apps (writing assistant + character database + fanfic editor + social platform + recommendation engine) into one screen. (1) **Land on `https://fanfic-lab.tech`** — cinematic full-bleed hero with Honkai: Star Rail splash arts and KV (key-visual) imagery, plus a Honkai: Star Rail fan content attribution credit (the project takes the IP-attribution discipline seriously even though it's a non-commercial fan tool). (2) **Sign in via Stack Auth** — branded sign-in/up shell with explicit error classification, mobile + perf polish. (3) **Hit the "create" page** — type a Chinese prompt describing the CP you want to read about ("想看砂金和藿藿的现代AU虐转甜"). (4) **Backend kicks off a DreamWriter agent run**: the Next.js API route POSTs to `LANGGRAPH_URL=http://agent:8123` (Docker Compose internal hostname) which runs the 7-node graph; the frontend polls for `logs` updates and shows them in Chinese ("正在解析您的需求..." → "正在策划故事..." → "正在创作..." → "正在质量检查 (8/10)..." → "正在根据反馈修改第 1 版..." → "故事完成"). (5) **Story auto-publishes to the Fandom Feed** (a deliberate product decision in commit `b090c04` "auto-publish stories, remove shelf page and drafts tab" — friction kills first-time creators). (6) **Other users discover it via**: the feed (filterable by fandom / ships / tags / rating / status, sortable by recent / popular / comments / word count, with infinite scroll); SEO/OG tags + sitemap for organic search; **pgvector related-story recommendations** on each story page (commit `48428e6` — cosine similarity over title+summary+ships+tags embeddings, deliberately *not* over chapter content because we want thematic matching, not prose-style matching); **per-author public pages** at `/users/[username]` with their stories + followers + following. (7) **Engagement primitives**: like a story, follow an author, leave a nested-reply comment, like comments, get notified in the bell + notifications page when someone interacts with your work. (8) **Story reader page**: per-reader font / line-height preferences (commit `6551966`) + scroll position memory so the reader can pause + resume, plus dark mode toggle in the header (commit `b922cf8`). (9) **Author tools**: edit published stories, continue any story with a new chapter (with auto-generated chapter titles, commit `30df8fe`), avatar crop preview via react-easy-crop. The cumulative effect: **a fan-creation community where the friction from "I want to read this" to "this story exists and other fans are commenting on it" is one Chinese sentence**.
      businessLogic: |
        This is an MIT-licensed open-source fan-creation tool with a non-commercial usage stance toward the HSR IP — it ships an explicit Honkai: Star Rail fan content attribution on the homepage and treats the canon knowledge pack as a *fan-curated* reference, not commercial use of HoYoverse assets. The infrastructure choices are however explicit and deliberate. **Deployment model**: the production stack runs on a self-hosted DigitalOcean droplet behind Coolify (the migration playbook records the rationale — moving off Railway gave full control over runtime + the ability to host more services on the same box). **Model tiering**: GPT-4o-mini handles the intent parser + quality guard nodes; GPT-4o handles the writer node where prose quality matters; the quality-guard revision budget is capped at MAX_REVISIONS=2 so the agent loop is bounded; embeddings use `text-embedding-3-small`; the `SourceResearchCache` Prisma model + Redis tier persist Tavily results for 30 days to avoid duplicate fandom research. **Credits scaffolding**: the Prisma schema includes `UserCredits` and `Generation` models with `creditsCharged: Int` — credits infrastructure exists in the data layer as a foundation for future capacity controls but is not yet enforced in production, so the current version is fully free for users. **Build-time + runtime layout**: two services (web + agent) in one Docker Compose file means health checks, internal networking, restart policies, and rolling deploys are all handled by one Coolify project rather than fragmented across providers. **Discovery loop**: per-story SEO/OG tags + sitemap (commit `897a43d`) + the related-stories pgvector recommender compound organic discoverability over time.
      technicalApproach: |
        The system is organised around four orthogonal layers that together produce the user-visible behaviour.

        **Layer 1 — Adaptive LangGraph agent with self-revising quality loop.** `src/agent/dreamwriter/graph.ts` defines a `StateGraph<DreamWriterStateAnnotation>` with 7 nodes wired into a deliberate topology: **intent_parser** (GPT-4o-mini, temp 0.3, extracts `{cp, setting, tone, constraints, language}` from Chinese natural-language input) → **story_architect** (GPT-4o, plans `{title, cp, setting, tone, wordTarget, emotionalArc, scenes[]}`) → **writer** (GPT-4o, temp 0.9, generates prose using the HSR knowledge prompt + RAG context) → **quality_guard** (GPT-4o-mini, temp 0.3, scores the draft against the same knowledge prompt and returns `{overallScore, oocIssues[], consistencyIssues[], proseNotes[], passesThreshold}`) → **conditional edge** `routeAfterQualityCheck`: if `!passesThreshold && revisionCount < MAX_REVISIONS(=2)`, route back through **revision_counter** → **writer** with the quality feedback appended to the prompt; otherwise → **summarize** (writes the public-facing one-paragraph blurb) → **delivery** (END). The state annotation includes a `logs[]` reducer so the frontend can show Chinese progress text in near-real-time. `MemorySaver` checkpointing is used so runs survive process restarts during long agent calls.

        **Layer 2 — Hand-curated fandom knowledge pack + pgvector RAG.** Two complementary mechanisms feed the writer node: **(a) the deterministic knowledge prompt** in `src/knowledge/hsr/` — `characters.ts` defines 5 HSR characters (砂金 / 藿藿 / 丹恒 / 景元 / 花火) as `CharacterProfile` objects with `name`, `aliases[]`, `personality[]`, `speechPatterns`, `emotionalTriggers[]`, `relationships: Record<string, string>`, and `timelineStates`; `relationships.ts` has 4 `RelationshipDynamic` objects with `keyMoments[]`; `world.ts` has 5 `WorldRule` categories (命途体系 etc.); `tropes.ts` has 5 `TropeTemplate` objects (现代AU / ABO / Hurt-Comfort / 豆花/甜饼 / 前世今生) with per-character `characterAdaptations`; `index.ts` composes everything via a `toSystemPrompt()` method that produces a structured Chinese prompt with `▎character` headers + `性格特征` / `说话方式` / `情感触发点` / `人际关系` / `时间线状态` fields. **(b) The probabilistic RAG layer** in `src/knowledge/base/rag.ts` — `retrieveRelevantChunks(query, fandom, limit)` embeds the query via `text-embedding-3-small`, runs a raw SQL `embedding <=> vector` cosine-distance query against the `KnowledgeChunk` table (with a pgvector ivfflat index), returns the top-k chunks. The writer node calls both, concatenating the deterministic knowledge prompt with the RAG context before invoking GPT-4o. This split lets the *fixed* canon (character personalities) be edited as code while the *long-tail* canon (specific scenes, story snippets) lives as embeddings and grows over time.

        **Layer 3 — Two-Docker-service production deployment via DigitalOcean + Coolify.** The codebase ships **two Dockerfiles** (`Dockerfile.web` for Next.js 16 + Prisma 7, `Dockerfile.agent` for LangGraph CLI) and one `docker-compose.coolify.yml` that wires them into a single Coolify project. Internal networking uses Docker Compose service names (`web` calls `http://agent:8123` via the Compose-managed bridge network — no Railway-internal-DNS, no nginx, no manual sidecar config). **Health checks** are explicit: `web` polls `/api/health` (which itself checks Redis + Postgres latency), `agent` polls LangGraph's `/info` endpoint, both with `start_period: 30-40s` to tolerate cold starts. **External proxy chain**: Cloudflare (proxy mode, SSL termination, CDN) → DigitalOcean droplet 159.223.173.17 → Traefik (built into Coolify, handles `:80`/`:443` and routes by host) → Docker container. **CI/CD**: `.github/workflows/deploy.yml` on every `git push master` runs a 2-image parallel Docker Buildx build, pushes both to GHCR (`ghcr.io/chanmeng666/fanfic-lab/{web,agent}` tagged per-SHA + `latest`, with separate `cache-from` scopes for each image), then SSH-deploys to the VPS with a 20-minute timeout. The 600+ line `docs/MIGRATION_RAILWAY_TO_DIGITALOCEAN.md` playbook documents the entire transition including DNS cutover, Cloudflare config, Coolify project setup, lessons learned (Docker registry case-sensitivity bug fixed in commit `839e9c1`), and a "Claude Code Automation Playbook" section — turning the migration into a reusable artifact.

        **Layer 4 — Full UGC community substrate with pgvector recommendations + trigram search.** The Prisma schema models 21 tables centred on `User` ↔ `Story` ↔ `Chapter` with full social graph (`Follow`), engagement primitives (`Like`, `Comment` with `parentId` self-reference for nested replies, `CommentLike`), discovery primitives (`Notification` with polymorphic `payload: Json`), preferences (`UserPreferences` includes `preferredCPs[]`, `preferredTropes[]`, `avoidTropes[]`, `tonePreference`, `lengthPreference` — feeding into the personalised feed *and* into future agent-prompt personalisation), and the AI-generation audit trail (`Generation` model with `request: Json`, `plan: Json`, `deliverable: Json`, `tokensUsed`, `creditsCharged`, `durationMs`). **Two specialised PostgreSQL extensions** are deliberately exploited: **(i) pg_trgm** with GIN indexes on `Story.title` and `Story.summary` (migration `20260421091500_enable_pgtrgm_search`) — turns Prisma's `contains:` queries from sequential scans into trigram-index lookups, scaling search past a few hundred stories without code change; **(ii) pgvector** with an ivfflat cosine index on `Story.embedding` (migration `20260421093000_add_story_embedding`, `lists=100`) — every story gets a 1536-dim embedding generated from `title + fandom + ships + tags + summary` (deliberately *not* chapter content, because we want thematic match, not prose-style match), and the related-stories endpoint runs cosine-distance queries to surface similar work. `setStoryEmbedding()` in `lib/story-embedding.ts` uses raw SQL because Prisma 7 doesn't yet support direct writes to the `vector` type. A `scripts/backfill-embeddings.ts` script handles legacy stories created before the embedding column existed.

        The four layers are loosely coupled: the agent can be re-shaped without touching the DB schema, the knowledge pack can grow without touching the agent topology, the deployment substrate can move providers (the Railway → DigitalOcean migration is the proof) without touching the application, and the community layer's pgvector + pg_trgm indexes are content-agnostic.
      outcomes: |
        - **182 commits over ~16 weeks** (2026-01-01 → 2026-04-21), spanning a complete product redesign mid-project: the first iteration was a generic CopilotKit + LangGraph fanfic editor with HITL approval cards; the HSR DreamWriter pivot in commit `a288e25` ("HSR DreamWriter - complete product redesign", 2026-03-23) plus commit `b5baf34` ("remove old pipeline, editor, wizard, and generator code", same day) deliberately deleted the old codebase to focus on a single fandom with deep canon support.
        - **Adaptive quality-loop agent shipped** in commit `a06d96f` "wire up adaptive DreamWriter agent graph with quality loop" — the conditional revision edge with MAX_REVISIONS=2 turns a one-shot generator into a self-correcting agent, dramatically reducing OOC errors per Chan's internal observations.
        - **Hand-curated HSR canon knowledge pack** built across commits `e5e82ac` (initial pack) → `1a0fa53` (HSR_TROPES extraction) → `611d0e0` (KnowledgeChunk model + DreamWriter preference fields in `UserPreferences`) → `f9b1fcf` (RAG utilities). 5 deeply-modeled characters + 4 relationships + 5 world rules + 5 trope templates.
        - **Railway → DigitalOcean + Coolify migration** completed 2026-04-03 (commit `734e69c`), documented in a 600+-line reusable playbook at `docs/MIGRATION_RAILWAY_TO_DIGITALOCEAN.md` that includes lessons-learned (Docker registry case-sensitivity, SSH timeout tuning) and a "Claude Code Automation Playbook" section.
        - **GitHub Actions zero-downtime CI/CD** added in commit `985e0b4` "ci: add GitHub Actions CI/CD for zero-downtime deployment" — parallel image builds with per-image cache scopes, GHCR registry, SSH-deployment-by-push.
        - **Full social graph + discovery substrate** built in the last 4 days of active development (2026-04-21): nested-reply comments + likes + spam protection (`d234471`), in-app notifications (`f171ce3`), public followers/following pages (`d96fc68`), per-author public pages (`e465240`), pgvector related-stories (`48428e6`), pg_trgm search indexes (`9bd86a9`), per-story view counts (`f598394`), per-story SEO/OG + sitemap (`897a43d`), dark mode (`b922cf8`), reader font/line-height + scroll memory (`6551966`), avatar crop preview (`9554785`), branded sign-in/up shell (`a8fccd3`).
        - **Production stack survives a multi-service migration**: the same codebase ran on Vercel + Railway, then Vercel + Railway-LangGraph-only, then DigitalOcean + Coolify (current), without breaking the agent contract.
        - **Operational discipline**: 2 services run on a self-hosted DO droplet via Coolify; deliberate model tiering (mini for parsing/checking, full for prose) + cache-first Tavily research + capped revision budget keep the agent loop predictable.
        - **Production URL live**: https://fanfic-lab.tech/ (with www → root redirect), Cloudflare-proxied, MIT-licensed.
      myRole: |
        Sole author, designer, and operator. Every one of the 182 commits is mine. I wrote both the initial CopilotKit + LangGraph fanfic editor (commits `0a3d1f5` → `36c5469` Teal+Amber "Literary Atelier" design system → `cdc3586` Railway deployment), made the call to scrap that direction and pivot to HSR-specific DreamWriter (commits `cbd31cc` "pivot from MDZS to Honkai: Star Rail based on 2025-2026 fandom trends" → `4790851` MDZS implementation plan as comparison reference → `a288e25` "HSR DreamWriter - complete product redesign" + `b5baf34` the same-day old-code deletion), hand-curated the entire HSR canon knowledge pack (5 characters with their specific 性格特征 / 说话方式 / 情感触发点 — this is bespoke fandom-domain knowledge, not scraped), wrote the 7-node adaptive LangGraph topology including the conditional revision edge, designed the Prisma schema (21 models including the polymorphic `Notification.payload: Json`, the self-referential `Comment.parentId` for nested replies, the deliberate split between `KnowledgeChunk` for RAG and `SourceResearchCache` for Tavily caching, the `UserCredits` + `Generation` audit foundation), wrote both Dockerfiles + the Coolify compose file + the GitHub Actions deploy workflow, executed the Railway → DigitalOcean + Coolify migration (and *documented* it as a reusable playbook), wrote the pgvector + pg_trgm migrations and the `lib/story-embedding.ts` raw-SQL escape hatch, and built the entire community-feature sprint (comments, notifications, follows, related stories, search indexing, view counts, SEO, dark mode, reader preferences, avatar cropping) in the final ~96-hour push 2026-04-18 → 2026-04-21. The project doubles as a personal R&D lab for the rest of the portfolio: the Coolify-on-DO migration playbook informed similar deployments in archcanvas (Workers → DO VPS), the GitHub-Actions-to-GHCR-to-SSH pattern reappeared in subsequent multi-service projects, and the pgvector + ivfflat + cosine-similarity recipe became the template I reused for related-content recommendations elsewhere.
