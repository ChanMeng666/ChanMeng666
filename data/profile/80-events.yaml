# =============================================================================
# EVENTS — offline / in-person activities: talks, panels, hackathons mentored,
# workshops taught, community appearances.
# =============================================================================
# Shard of Chan Meng's profile data. Top-level key: events.
# All data/profile/*.yaml shards are merged (in filename order) by
# scripts/lib/load-profile.mjs and validated against schema/profile.schema.json.
# After editing: npm run check. Data map + field template: CLAUDE.md /
# docs/CONTRIBUTING-DATA.md.
#
# Purpose: a running log of braggable offline appearances so that at year-end an
# AI reading this database can generate summaries and personal-brand copy, and so
# every public-facing surface can cite where Chan showed up. Entries CROSS-REFER
# awards[]/work[]/projects[] (relatedAwardTitle / relatedWorkId / relatedProjectId)
# rather than duplicating their prose.
#
# Field template (see docs/CONTRIBUTING-DATA.md "Adding an event"):
#   id, name, role (Speaker|Panelist|Mentor|Judge|Instructor|Organizer|Attendee),
#   type (talk|panel|hackathon|workshop|conference|community|award|media),
#   date ("YYYY-MM-DD"), endDate (optional), location, organizer, url,
#   keywords[], summary (| block), tier, recency, lastUpdated,
#   optional relatedAwardTitle / relatedWorkId / relatedProjectId.
# =============================================================================
