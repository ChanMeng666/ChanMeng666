<svg width="1200" height="630" viewBox="0 0 1200 630" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <style>
      .display { font-family: 'Anton', 'Arial Black', 'Arial', sans-serif; font-weight: 900; }
      .sans { font-family: 'Arial', 'Helvetica', sans-serif; }
    </style>
  </defs>

  <!-- Canvas: ash -->
  <rect width="1200" height="630" fill="#F7F6F2"/>

  <!-- Right bold orange block (Caldera) -->
  <rect x="864" y="0" width="336" height="630" fill="#FC5000"/>
  <text x="1032" y="350" text-anchor="middle" class="display" font-size="240" fill="#F7F6F2" opacity="0.96">CM</text>

  <!-- Thin ink frame -->
  <rect x="20" y="20" width="1160" height="590" fill="none" stroke="#070607" stroke-width="4"/>

  <!-- Name -->
  <text x="72" y="186" class="display" font-size="116" fill="#070607" letter-spacing="-1">Chan Meng</text>

  <!-- Orange rule -->
  <rect x="76" y="216" width="200" height="10" fill="#FC5000"/>

  <!-- Role -->
  <text x="74" y="300" class="sans" font-weight="700" font-size="40" fill="#FC5000">AI Agent Architect &amp; Full-stack Engineer</text>

  <!-- Tagline -->
  <text x="74" y="372" class="sans" font-weight="600" font-size="31" fill="#070607">I build AI software real teams rely on every</text>
  <text x="74" y="414" class="sans" font-weight="600" font-size="31" fill="#070607">day — not demos.</text>

  <!-- Proof line -->
  <text x="74" y="486" class="sans" font-weight="500" font-size="23" fill="#5B5B59">Production AI agents · MCP · Full-stack · UN CSW 69 Speaker</text>

  <!-- Footer -->
  <text x="74" y="556" class="sans" font-weight="700" font-size="26" fill="#070607">chanmeng.org</text>
  <text x="828" y="556" text-anchor="end" class="sans" font-weight="500" font-size="22" fill="#5B5B59">Auckland, New Zealand</text>
</svg>
