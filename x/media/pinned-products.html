<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>Chan Meng — Pinned Products (Caldera)</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Anton&family=DM+Sans:opsz,wght@9..40,400;9..40,500;9..40,600;9..40,700&display=swap" rel="stylesheet">
<style>
  :root{
    --basalt:#E2E2DF; --ash:#F7F6F2; --white:#FFFFFF; --ink:#070607;
    --orange:#FC5000; --violet:#524AE9; --glare:#F5F28E; --muted:#5B5B59;
  }
  *,*::before,*::after{ box-sizing:border-box; }
  html,body{ margin:0; padding:0; background:#aaa; font-family:'DM Sans',sans-serif; -webkit-font-smoothing:antialiased; }

  /* Full-bleed basalt canvas — no frame, no border, no card-within-card.
     X renders inline media at 16:9; this is 1200×675, captured at 2×. */
  .sheet{
    width:1200px; height:675px; position:relative;
    background:var(--basalt); overflow:hidden;
    padding:96px 100px;
    display:flex; flex-direction:column; justify-content:space-between;
  }

  /* ── Eyebrow — small uppercase kicker, top-left. ── */
  .eyebrow{
    display:flex; align-items:center; gap:14px;
    font-weight:700; font-size:16px; letter-spacing:0.22em; text-transform:uppercase;
    color:var(--ink);
  }
  .eyebrow .sq{ width:11px; height:11px; background:var(--orange); flex:none; display:block; }

  /* ── Product list — typographic rows, separated by air + a quiet hairline.
        No boxes. Name column is fixed-width so the one-liners align. ── */
  .list{ display:flex; flex-direction:column; }
  .row{
    display:flex; align-items:center; gap:28px;
    padding:19px 0;
  }
  .row + .row{ border-top:1px solid rgba(7,6,7,0.11); }

  .name-wrap{
    width:392px; flex:none;
    display:flex; align-items:center; gap:16px;
  }
  .name-wrap .bullet{ width:8px; height:8px; background:var(--orange); flex:none; display:block; }
  .pname{
    font-family:'Anton',sans-serif; font-weight:400; font-size:44px;
    line-height:1; letter-spacing:0.012em; color:var(--ink);
  }
  .pdesc{
    font-weight:500; font-size:21px; line-height:1.3; letter-spacing:0.004em;
    color:var(--muted);
  }

  /* ── Footer signature — monkey mark + wordmark, bottom-left, aligned to the
        left edge of everything above it. Transparent-black SVG sits directly
        on basalt (no tile, no invert trick needed). ── */
  .sign{
    display:flex; align-items:center; gap:14px;
  }
  .sign img{ height:30px; width:auto; display:block; flex:none; }
  .sign .who{ font-weight:600; font-size:19px; letter-spacing:0.01em; color:var(--ink); }
</style>
</head>
<body>

<div class="sheet" data-out="pinned-products.png">

  <div class="eyebrow"><span class="sq"></span>What I Build</div>

  <div class="list">
    <div class="row">
      <div class="name-wrap"><span class="bullet"></span><span class="pname">Google News MCP</span></div>
      <div class="pdesc">Live news for AI assistants</div>
    </div>
    <div class="row">
      <div class="name-wrap"><span class="bullet"></span><span class="pname">echook</span></div>
      <div class="pdesc">Talk-to-configure notifications for coding agents</div>
    </div>
    <div class="row">
      <div class="name-wrap"><span class="bullet"></span><span class="pname">ArchLang</span></div>
      <div class="pdesc">A text language for floor plans</div>
    </div>
    <div class="row">
      <div class="name-wrap"><span class="bullet"></span><span class="pname">ArchCanvas</span></div>
      <div class="pdesc">Describe a building, get a buildable plan</div>
    </div>
    <div class="row">
      <div class="name-wrap"><span class="bullet"></span><span class="pname">Vitex</span></div>
      <div class="pdesc">Job ad in, tailored resume out</div>
    </div>
  </div>

  <div class="sign">
    <img src="../../public/brands/chan-meng-monkey-black-transparent.svg" alt="">
    <span class="who">Chan Meng</span>
  </div>

</div>

</body>
</html>
